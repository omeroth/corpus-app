<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #F0EAFC;
    --plate:   #FDFBF6;
    --rim:     #E5C158;
    --wordmark: #7B4FD4;
    --name:    #3D2E66;
    --era:     #9A85C4;
    --question: #4A3580;
    --url:     #B8860B;
  }
  html, body {
    background: var(--bg);
    color: var(--name);
    font-family: 'Rubik', sans-serif;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 64px;
    text-align: center;
  }
  .wordmark {
    font-weight: 600;
    font-size: 22px;
    color: var(--wordmark);
    letter-spacing: -.01em;
    margin-bottom: 32px;
  }
  .card {
    display: block;
    width: 100%;
    max-width: 640px;
    margin: 0 auto 32px;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  }
  .redirecting {
    font-weight: 600;
    font-size: 18px;
    color: var(--name);
    margin-bottom: 20px;
    opacity: 0.75;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    padding: 14px 28px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 16px;
    text-decoration: none;
    background: var(--wordmark);
    color: #FFFFFF;
    transition: transform .15s;
  }
  .cta:active { transform: scale(.97); }
  .url {
    display: block;
    margin-top: 32px;
    color: var(--url);
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
  }
</style>

<body>
<main>
  <div class="wordmark">Corpus</div>
  <img class="card" src="https://corpusapp.io/share/cards/en/phil-bonus1-3.png" alt="Aristotle: AI and Responsibility — Aristotle" width="1200" height="630">
  <p class="redirecting">Opening Corpus…</p>
  <a class="cta" id="manual" href="https://apps.apple.com/app/id6781227385">Open Corpus</a>
  <a class="url" href="https://corpusapp.io">corpusapp.io</a>
</main>
<script>
  // Client-side redirect. Preview crawlers (facebookexternalhit, WhatsApp,
  // Twitterbot, Slackbot, LinkedInBot) don't execute JS, so they only see the
  // OG tags above — the card renders as a link preview. Human visitors get
  // bounced to the right store on tap.
  (function () {
    var ua = navigator.userAgent || '';
    var isIOS     = /iPhone|iPad|iPod/i.test(ua);
    var isAndroid = /Android/i.test(ua);
    var target = "https://corpusapp.io";
    if (isIOS)          target = "https://apps.apple.com/app/id6781227385";
    else if (isAndroid) target = "https://apps.apple.com/app/id6781227385";
    var manual = document.getElementById('manual');
    if (manual) manual.href = target;
    // Delay one tick so the visible fallback flashes long enough to explain
    // what's happening if the store app takes a moment to open.
    setTimeout(function () { location.replace(target); }, 250);
  })();
</script>
</body>
