const WEEKS_EN = [
  {
    id: 1, title: 'What is Philosophy?', subtitle: 'Big questions, open answers',
    days: [
      { id:1, title:'Socrates — The Birth of Philosophy', thinker:'Socrates', thinkerId:'socrates', xp:30, sections:[
        { type:'idea', title:'What Does It Mean to Ask Questions?', body:'Socrates believed philosophy is not a doctrine of answers but an art of questions. He wandered the agora of Athens, disturbing people\'s comfort — questioning politicians, artists, craftsmen. Everyone was confident; everyone discovered they knew nothing. But the man who knew he didn\'t know? That man, Socrates said, was the wisest of all.' },
        { type:'source', title:'From the Source', quote:'"I know that I know nothing — and this knowledge, that I do not know, is all I still possess."', attr:'— Socrates, as recorded in Plato\'s Apology', body:'Socrates said this before the court that sentenced him to death. He didn\'t beg for mercy — he explained why his life was worth living. His crime: making people think.' },
        { type:'explanation', title:'Why Does This Matter?', body:'We live in a culture that prizes answers. Grades, degrees, titles — all signal that we "know." Socrates turned this upside down: the beginning of real knowledge is the willingness to admit we don\'t know. His "I don\'t know" was not surrender — it was an opening. The deepest thinkers in every field are those humble enough to say "I\'m not sure."' },
        { type:'quiz', question:'What was Socrates\' main method of teaching?', options:['Writing philosophical books','Dialogue and asking questions','Giving lectures across Greece'], correct:1, explanation:'Socrates wrote nothing! Everything we know about him came from his students — primarily Plato. His method was conversation, dialogue, questions — the "maieutic" method: the art of helping ideas be born in others\' minds.' },
        { type:'reflection', title:'To Close — Think', questions:['Is there a question in your life you\'ve been avoiding asking?','When did you last say "I don\'t know" honestly?','Which of your certainties might actually be wrong?'] },
      ]},
      { id:2, title:'Plato — Out of the Cave', thinker:'Plato', thinkerId:'plato', xp:30, sections:[
        { type:'idea', title:'Are You Seeing Reality?', body:'Plato argued that most people are like prisoners in a cave — they see only shadows on a wall and mistake them for reality. The philosopher, according to Plato, is the one who turns around, exits the cave, and sees the sun — true reality. But when he returns to explain this to the others, they don\'t believe him.' },
        { type:'source', title:'The Allegory of the Cave', quote:'"Imagine people chained in a cave since childhood, facing a wall. Behind them, a fire; between them and the fire, figures passing. The shadows the prisoners see — that is their entire world."', attr:'— Plato, The Republic, Book VII', body:'This is one of the most famous allegories in the history of philosophy. Plato used it to explain the difference between opinion (doxa) and true knowledge (episteme).' },
        { type:'explanation', title:'What Does the Cave Mean Today?', body:'Today we can name the shadows: social media feeds, consumer culture, prejudices absorbed in childhood. Philosophy invites us to ask: "Which of the shadows I see every day is not reality itself?" Not to live in fear — but to live with awareness. The cave isn\'t only ancient Athens. It\'s every comfortable assumption we\'ve never questioned.' },
        { type:'quiz', question:'What does the sun symbolize in Plato\'s cave allegory?', options:['The comfortable life in the city','The supreme Good and Truth','The beauty of the natural world'], correct:1, explanation:'The sun symbolizes "the Good" (to agathon) — the supreme principle from which all knowledge, truth, and beauty flow. The fully realized philosopher is the one who has seen the sun and can live in its light.' },
        { type:'reflection', title:'To Close — Think', questions:['What "shadows" do you see every day without questioning them?','Have you ever had a moment of "leaving the cave" — a sudden shift in perception?','If you were outside the cave, what would you want to tell the people inside?'] },
      ]},
      { id:3, title:'Bertrand Russell — Philosophy for Life', thinker:'Bertrand Russell', thinkerId:'russell', xp:30, sections:[
        { type:'idea', title:'What Is Philosophy Worth in Daily Life?', body:'Russell believed philosophy is not reserved for academia. Its value lies not in the answers it provides — because such answers are mostly unavailable. Its value is in the questions themselves: in enlarging our sense of the possible, enriching our intellectual imagination. A life examined through philosophy is simply a richer life.' },
        { type:'source', title:'From "The Problems of Philosophy"', quote:'"The value of philosophy is to be sought largely in its very uncertainty. The man who has no tincture of philosophy goes through life imprisoned in the prejudices derived from common sense, from the habitual beliefs of his age or his nation."', attr:'— Bertrand Russell, The Problems of Philosophy, 1912', body:'Russell wrote this book at 40 as a popular project to bring philosophy into ordinary homes. He wanted philosophy to free people from the prison of unexamined assumptions. It succeeded — the book is still read today.' },
        { type:'explanation', title:'Uncertainty as a Gift', body:'We don\'t like uncertainty. Our brains crave security, patterns, answers. But Russell proposed something surprising: the ability to live with uncertainty — to hold a question open without rushing to an answer — is a sign of intellectual and emotional maturity. This is not weakness; it\'s strength. The person who needs an answer to everything is more imprisoned than the one who can sit with "I don\'t know."' },
        { type:'quiz', question:'According to Russell, what is the main value of philosophy?', options:['Finding certain answers','The questions it raises','Proving the existence of God'], correct:1, explanation:'Russell was clear: philosophy does not provide certain answers — and shouldn\'t be expected to. Its value is in expanding thought, in flexibility, in the willingness to live with open questions. The enlargement of self, not the settling of it.' },
        { type:'reflection', title:'To Close — Think', questions:['Does uncertainty frighten you? What does it stir in you?','What open questions accompany your life — perhaps without answers?','What philosophical question has always interested you?'] },
      ]},
      { id:4, title:'Wittgenstein — The Limits of Language', thinker:'Ludwig Wittgenstein', thinkerId:'wittgenstein', xp:30, sections:[
        { type:'idea', title:'Language as the Boundary of the World', body:'Wittgenstein arrived at a revolutionary conclusion: most philosophical problems are not real problems — they arise from linguistic confusion. When we ask "What is time?" or "What is justice?" we often don\'t understand the very words we\'re using. The language we inherit shapes the world we can think in.' },
        { type:'source', title:'From the Tractatus', quote:'"The limits of my language mean the limits of my world. Whereof one cannot speak, thereof one must be silent."', attr:'— Ludwig Wittgenstein, Tractatus Logico-Philosophicus, 1921', body:'Wittgenstein wrote the Tractatus at 29, during World War I — a soldier with the manuscript in his backpack. He submitted it as a doctoral thesis at Cambridge. No revisions were required. He believed it had solved all the problems of philosophy.' },
        { type:'explanation', title:'What This Means for Us', body:'If we want to understand ourselves better, we can start with the language we use to describe ourselves. "I\'m hopeless," "I\'m depressed," "I can\'t" — these words don\'t just describe reality, they construct it. According to Wittgenstein, changing the language changes the world. Not everything can be spoken — but noticing what we say (and don\'t say) is a first step.' },
        { type:'quiz', question:'What did Wittgenstein believe about most philosophical problems?', options:['They need scientific solutions','They arise from linguistic confusion','They are fundamentally religious questions'], correct:1, explanation:'Wittgenstein saw most philosophical problems as "diseases of language" — confusions created by imprecise use of words. The philosopher\'s task, he believed, is to clarify language and show that the problem, properly stated, simply dissolves.' },
        { type:'reflection', title:'To Close — Think', questions:['Which words you use to describe yourself might not reflect reality?','Are there things you keep "silent" about — things that have no place in your language?','How might changing one word you habitually use change something in your life?'] },
      ]},
      { id:5, title:'Marcus Aurelius — Philosophy as a Way of Life', thinker:'Marcus Aurelius', thinkerId:'aurelius', xp:30, sections:[
        { type:'idea', title:'The Most Powerful Man in the World Kept a Journal', body:'Marcus Aurelius was the most powerful emperor in the world — and at night he wrote reminders to himself to live a good life. Not for greatness, not for victory — to keep his moral footing. His Meditations was never written for publication; it was a private journal that survived by chance.' },
        { type:'source', title:'From the Meditations', quote:'"The happiness of your life depends upon the quality of your thoughts. Rule your mind or it will rule you. The world outside is subject to change; your inner life is your own."', attr:'— Marcus Aurelius, Meditations, Book III', body:'The Stoics believed true freedom lies not in freedom from circumstances, but in freedom from reaction to them. Not what happens to us, but what we choose to think about it. This is the practice Aurelius returned to every morning.' },
        { type:'explanation', title:'Philosophy You Live, Not Just Think', body:'Aurelius didn\'t just "think" philosophy — he lived it. Each morning he wrote reminders: "Today I will meet difficult people — I will remember they, like me, are trying." "Things outside my control are not mine to worry about." This is practical philosophy, not theoretical. The Stoic insight: the only thing truly yours is your response.' },
        { type:'quiz', question:'Who did Marcus Aurelius primarily write the Meditations for?', options:['The citizens of Rome','His philosophical students','Himself'], correct:2, explanation:'The Meditations were not written for publication. They are Aurelius\'s private journal — reminders he wrote to keep himself on the right path. That\'s what makes them so moving: the most powerful man in the world wrote letters to himself saying "Don\'t forget."' },
        { type:'reflection', title:'To Close — Think', questions:['What would you write to yourself this morning as a reminder to live well?','Is there a recurring thought pattern worth examining?','What\'s the difference between philosophy as thinking and philosophy as living?'] },
      ]},
      { id:6, title:'Aristotle — Wonder and Philosophy', thinker:'Aristotle', thinkerId:'aristotle', xp:30, sections:[
        { type:'idea', title:'All Philosophy Begins in Wonder', body:'Aristotle said something that sounds simple but runs deep: philosophy is born from wonder. When we marvel at something, ask "why?", "how?", "what is this?" — we\'re already doing philosophy. Children are natural philosophers — they ask without stopping. Adults learn to stop wondering.' },
        { type:'source', title:'From the Metaphysics', quote:'"It is owing to their wonder that men both now begin and at first began to philosophize. They wondered first about obvious difficulties, then advanced to greater things, such as the changes of the moon and sun and stars, and the origin of the universe."', attr:'— Aristotle, Metaphysics, Book I', body:'Aristotle saw wonder not as a weakness but as a power. When we stop wondering, we stop living with open eyes. The philosopher is not someone who has all the answers — it\'s someone who hasn\'t lost the capacity to be astonished.' },
        { type:'explanation', title:'Wonder as a Practice', body:'Wonder is not a passive feeling — it\'s an active choice. When we slow down, pay attention, ask questions — we choose to be in wonder. Aristotle suggested that wonder is not only the starting point — it\'s the destination. The complete person is one who still marvels.' },
        { type:'quiz', question:'Who was Aristotle\'s teacher?', options:['Socrates','Plato','Heraclitus'], correct:1, explanation:'Aristotle studied under Plato for about 20 years at the Academy — but ultimately broke with his teacher on key points. For Aristotle, Plato\'s Forms don\'t exist in a separate realm but within things themselves. One of the great debates in philosophical history.' },
        { type:'reflection', title:'To Close — Think', questions:['When were you last genuinely amazed by something?','What caused you to stop wondering — and what might help you return?','If you stepped outside tomorrow with a child\'s eyes, what would you see differently?'] },
      ]},
      { id:7, title:'Week One — What Have We Learned?', thinker:'All Thinkers', thinkerId:'descartes', xp:50, sections:[
        { type:'idea', title:'Seven Days, One Question', body:'A whole week on "What is philosophy?" — and not one answer. Socrates said: ask. Plato said: leave the cave. Russell said: bear uncertainty. Wittgenstein said: watch your language. Aurelius said: live the ideas. Aristotle said: keep wondering. And perhaps all of these together are philosophy.' },
        { type:'source', title:'The Heart of It All', quote:'"The unexamined life is not worth living."', attr:'— Socrates, The Apology', body:'Perhaps this sentence is the heart of everything we\'ve learned. Not to live on autopilot. Not to take everything for granted. To pause and ask — and continue anyway.' },
        { type:'explanation', title:'Philosophy in Your Life', body:'Philosophy is not a profession — it\'s an attitude. Every question you ask about your life, your values, what matters to you — that\'s philosophy. Every moment in which you stop and reflect — that\'s philosophy. You don\'t need Plato to be a philosopher. You need the will to think.' },
        { type:'quiz', question:'Which of this week\'s thinkers wrote nothing himself — everything we know came from others?', options:['Aristotle','Plato','Socrates'], correct:2, explanation:'Socrates wrote nothing! Everything we know about him came from secondary sources — primarily Plato, but also Xenophon and Aristophanes. Scholars still debate whether Plato\'s Socrates is the historical Socrates or Plato himself in dramatic form.' },
        { type:'reflection', title:'Week One Closing Questions', questions:['Which of this week\'s thinkers spoke to you most strongly? Why?','What did this week change in your thinking?','One philosophical question you\'d like to carry into next week?'] },
      ]},
    ],
  },
  {
    id: 2, title: 'Ethics — Living Well', subtitle: 'Three questions, three philosophers',
    days: [
      { id:1, title:'The Moral Problem', thinker:'Introduction to Ethics', thinkerId:'descartes', xp:30, sections:[
        { type:'idea', title:'When Inherited Maps Stop Working', body:'We are all born into a moral map — values, rules, expectations absorbed from family, society, and religion. Most of the time the map works. We know what\'s "right" and what\'s "wrong" — and don\'t ask why. But a moment comes — personal, social, moral — when the map fails. What do you do when there\'s no ready-made answer? That\'s where ethics begins.' },
        { type:'source', title:'Three Questions of Ethics', quote:'"Ethics concerns three foundational questions: What is good? What is right? Who should I be? Three questions, three approaches — and no philosopher has yet won."', attr:'— Karsten Harries, Introduction to Ethics, Yale, 2013', body:'Harries teaches that there\'s no single answer to ethics — there are three axes: the axis of the good (what brings flourishing?), the axis of the right (what obligates me?), and the axis of identity (who do I want to become?). The three philosophers of this week — Aristotle, Kant, and Mill — each answers one axis.' },
        { type:'explanation', title:'Objective, Subjective, Relative', body:'Three basic positions: Objective morality says there are moral truths valid regardless of culture or opinion. Subjective morality says morality is an expression of personal preferences. Relative morality says morality depends on culture and society, with no external standard to judge between them. This week we\'ll explore the tension through three great thinkers.' },
        { type:'quiz', question:'What is the difference between subjective and relative morality?', options:['There is no difference — both reject objective morality','Subjective morality depends on the individual; relative morality depends on culture','Relative morality is more scientifically grounded'], correct:1, explanation:'Subjectivism says morality expresses personal preferences — "I think murder is wrong" like "I like chocolate." Relativism says morality depends on culture — so one culture cannot judge another. Both differ from objectivism, which believes in universal moral norms.' },
        { type:'reflection', title:'To Close — Think', questions:['When did your "moral map" last fail to provide an answer?','Do you believe there are objective moral truths? Why?','Which values did you inherit — and which did you choose yourself?'] },
      ]},
      { id:2, title:'Aristotle — The Good Life', thinker:'Aristotle', thinkerId:'aristotle', xp:30, sections:[
        { type:'idea', title:'Happiness Is Not a Feeling — It\'s a Way of Life', body:'When we say "I want to be happy" — we usually mean a good feeling, pleasure, contentment. Aristotle thought differently. He defined happiness as eudaimonia — flourishing. Not a passing feeling, but a sustained way of life in which you fulfill your human potential. And that potential? Reason.' },
        { type:'source', title:'From the Nicomachean Ethics', quote:'"The highest good for man is activity of the soul in accordance with virtue, and if there are more than one virtue, in accordance with the best and most complete."', attr:'— Aristotle, Nicomachean Ethics, trans. Yosef Gerhard Liebs, Schocken', body:'Aristotle argued that everything has a function — its natural purpose. A knife\'s function is to cut. An eye\'s function is to see. And what is the human function? Our unique capacity — reason. The best human is one who exercises reason most excellently.' },
        { type:'explanation', title:'The Golden Mean', body:'How does the excellent person live? Through virtues — character traits that represent a middle path between two extremes. Courage is the mean between cowardice and recklessness. Generosity is the mean between miserliness and extravagance. Virtues are not innate — they are acquired through habit. We become courageous by acting courageously.' },
        { type:'quiz', question:'What does "eudaimonia" mean for Aristotle?', options:['A momentary feeling of happiness','Flourishing — fulfilling one\'s human potential','Fulfilling religious obligations'], correct:1, explanation:'Eudaimonia is often poorly translated as "happiness." It\'s closer to "flourishing" — a life in which you realize what you essentially are. For Aristotle, this requires using reason, developing good character, and living in a community that supports it.' },
        { type:'reflection', title:'To Close — Think', questions:['Which virtues do you recognize in yourself? Where are you on the golden mean?','Do you think humans have a "function" — something we\'re meant to do?','What would "flourishing" look like in your life?'] },
      ]},
      { id:3, title:'Kant — What Must I Do?', thinker:'Immanuel Kant', thinkerId:'kant', xp:30, sections:[
        { type:'idea', title:'Duty Independent of Consequences', body:'Kant didn\'t ask "what will make me happy?" He asked "what is my duty?" He argued that the only genuinely moral action is one done from duty — not from fear, self-interest, or even love. When you return a found wallet because you\'re afraid of being caught — that\'s not moral. When you return it because it\'s right — that is.' },
        { type:'source', title:'The Categorical Imperative', quote:'"Act only according to that maxim whereby you can at the same time will that it should become a universal law."', attr:'— Immanuel Kant, Groundwork of the Metaphysics of Morals, chapters 13–14', body:'This is Kant\'s most famous formulation. The categorical imperative is not "do X to get Y" — it\'s "do X." Unconditionally. He asked: can I will that everyone act as I do? If yes — the action is moral. If not — it\'s forbidden.' },
        { type:'explanation', title:'Persons as Ends, Never Merely as Means', body:'Kant had a second formulation: "Act so that you treat humanity, whether in your own person or in that of another, always as an end and never as a means only." This means: it is wrong to use people as tools. When you deceive, exploit, or treat people as objects — you violate the dignity of humanity. This is the foundation of human rights.' },
        { type:'quiz', question:'According to Kant, what makes an action morally worthy?', options:['That it produces good consequences','That it is done from duty, not self-interest','That it conforms to the laws of the state'], correct:1, explanation:'Kant sharply separated "morally right" from "useful" or "pleasant." A moral action is one performed from duty — recognition of the moral law — not from inclination, emotion, or calculated benefit. Even love, for Kant, is not sufficient moral motivation.' },
        { type:'reflection', title:'To Close — Think', questions:['Have you ever done the "right thing" from fear rather than from duty? What\'s the difference?','Is there a situation where you would deceive — and want everyone to deceive? What does that show?','Do you always treat people around you as "ends"? When don\'t you?'] },
      ]},
      { id:4, title:'Mill — The Greatest Happiness', thinker:'John Stuart Mill', thinkerId:'mill', xp:30, sections:[
        { type:'idea', title:'What If Morality Is a Calculation?', body:'Mill asked a question that sounds simple: what is the purpose of morality? His answer: to maximize overall well-being. The right action is the one that produces the greatest happiness for the greatest number. This sounds reasonable — but its implications are far more complex than they appear.' },
        { type:'source', title:'From "Utilitarianism"', quote:'"Actions are right in proportion as they tend to promote happiness, wrong as they tend to produce the reverse. It is better to be Socrates dissatisfied than a fool satisfied."', attr:'— John Stuart Mill, Utilitarianism, chapter 2, 1863', body:'"Better to be Socrates dissatisfied" is surprising from someone who advocates for happiness. Mill distinguished: there are "higher" pleasures (intellectual, aesthetic, social) and "lower" pleasures (bodily, trivial). The quantity of happiness is not enough — quality also matters.' },
        { type:'explanation', title:'Strengths and the Problem', body:'Utilitarianism explains much: why lying is wrong (it damages trust), why helping others is good (it increases well-being). But there\'s a problem: if torturing one person would save a thousand, is it justified? Mill tried to address this through rule utilitarianism — but the debate never ended.' },
        { type:'quiz', question:'What did Mill mean by "higher" versus "lower" pleasures?', options:['Expensive versus cheap pleasures','Intellectual and spiritual pleasures versus physical and trivial ones','Permitted versus forbidden pleasures'], correct:1, explanation:'Mill didn\'t want his utilitarianism to sound like "do whatever feels good." He argued: the pleasure of deep thought is worth more than trivial entertainment. Someone who has experienced both will prefer the higher — even if accompanied by frustration. Hence "Socrates dissatisfied" beats a "fool satisfied."' },
        { type:'reflection', title:'To Close — Think', questions:['Do you believe morality can be "calculated"? How does that idea sit with you?','Is there a situation where harming one for the benefit of many is justified — and when isn\'t it?','Which "higher pleasures" are missing from your life?'] },
      ]},
      { id:5, title:'Nietzsche — Where Does Morality Come From?', thinker:'Friedrich Nietzsche', thinkerId:'nietzsche', xp:30, sections:[
        { type:'idea', title:'The Question No One Asked', body:'Aristotle asked what morality is. Kant asked what obligates me. Mill asked what is useful. Nietzsche asked a completely different question: where does morality come from? Who created it? And why? He wasn\'t interested in finding what\'s right — he wanted to expose the hidden history of the values we take for granted. He called this a "genealogy of morals."' },
        { type:'source', title:'From "On the Genealogy of Morality"', quote:'"What was called \'good\' was originally what the noble, strong, high-ranking defined as good — themselves and their deeds. What applied to the weak, the low, the common — was called \'bad.\' The great moral inversion: when the weak could not take revenge on the strong — they invented a morality that punishes them."', attr:'— Friedrich Nietzsche, On the Genealogy of Morality, 1887', body:'Nietzsche distinguished two types of morality: master morality — of the strong, generous, proud — defining "good" as affirmation, greatness, power. And slave morality — created from resentment (ressentiment) — defining "good" as "not bad," and elevating to virtue: humility, meekness, submission.' },
        { type:'explanation', title:'Humility: Virtue or Mask?', body:'A daily example. Say you weren\'t chosen for a role you wanted. You tell yourself: "I\'m not ambitious. Humility is a virtue." Nietzsche would ask: is this humility — or converting failure into virtue? Wouldn\'t it be more honest to say "I wanted that role, I didn\'t get it, and it hurts"? The paradox: people who internalize resentment and dress it as "humility" haven\'t given up power — they\'re exercising it through indirect means.' },
        { type:'quiz', question:'What does Nietzsche mean by "slave morality"?', options:['Morality created by actual slaves in ancient societies','Morality created by the weak out of resentment toward the strong','Morality that demands obedience to rules and authority'], correct:1, explanation:'Nietzsche wasn\'t talking about physical slaves — he was talking about psychology. "Slave morality" arises when those who cannot win through strength internalize their resentment and create a value system that turns powerlessness into virtue. Whoever said "humility is a virtue" may have done so because they couldn\'t afford to be proud.' },
        { type:'reflection', title:'To Close — Think', questions:['Choose one value you hold — and ask: who benefits from you holding it?','Did Nietzsche make you doubt any of your moral values? Which one?','Is Nietzsche\'s own critique itself an expression of "master morality" — or does that trap him in a contradiction?'] },
      ]},
      { id:6, title:'The Trolley Problem — Morality and the Brain', thinker:'Judith Jarvis Thomson', thinkerId:'kant', xp:30, sections:[
        { type:'idea', title:'Think Fast — A Runaway Trolley', body:'A thought experiment: a runaway trolley is about to kill five people. You can act — and save them. Will you act? It depends on how. Two versions of the same problem yield completely different moral responses — and this teaches us something deep about how our moral sense actually works.' },
        { type:'source', title:'The Two Versions', quote:'"Version A: You can divert the trolley to a side track where one person stands — five saved, one killed. Version B: You are on a bridge; you can push a large man off to stop the trolley — five saved, one killed."', attr:'— Judith Jarvis Thomson, The Yale Law Journal, 1985', body:'Most people will divert the trolley (Version A) but refuse to push (Version B) — even though the outcome is identical: 1 dies, 5 are saved. Why? Because in Version B, the harm is personal, direct, and intentional.' },
        { type:'explanation', title:'What Brain Imaging Shows', body:'Neuroimaging studies showed: "impersonal" dilemmas (like the diversion) activate primarily rational brain regions. "Personal" dilemmas (like the push) also activate emotional regions — the amygdala, the emotional cortex. The conclusion: our moral sense is not purely rational. Kant and Mill would give the same answer to both versions — but our emotions resist.' },
        { type:'quiz', question:'Why do most people divert a trolley but refuse to push a person — even when the outcome is the same?', options:['Because they\'re not thinking clearly','Because personal, direct harm triggers a different emotional response','Because they\'re unfamiliar with utilitarianism'], correct:1, explanation:'This is the central point of the trolley experiments: even when victim counts are identical, the way harm is caused changes our moral intuition. Direct, physical, hands-on harm triggers a stronger emotional response than indirect harm. This raises the question: is morality rational or emotional — or both?' },
        { type:'reflection', title:'To Close — Think', questions:['What would you do in each version of the trolley problem? Are your decisions consistent?','Are moral intuitions evidence — or bias?','What does it mean that our brains respond differently to personal versus impersonal harm?'] },
      ]},
      { id:7, title:'Week Two — The Map of Ethics', thinker:'All Thinkers', thinkerId:'mill', xp:50, sections:[
        { type:'idea', title:'Three Questions, Three Philosophers', body:'A whole week in ethics. Three philosophers, three different questions, three different answers. Aristotle asked: who should I be? Kant asked: what must I do? Mill asked: what will produce the greatest well-being? No single answer won — but each illuminates something real.' },
        { type:'source', title:'The Remaining Tension', quote:'"It may be that one of the great features of ethics is that its questions resist final resolution — and that this is precisely what compels us to keep thinking."', attr:'— Karsten Harries, Introduction to Ethics, Yale, 2013', body:'Utilitarianism asks: what are the consequences? Kantian deontology asks: what is the principle? Virtue ethics asks: what is the character? Each approach highlights a real dimension. The one who can deploy all three wisely may be the mature moral philosopher.' },
        { type:'explanation', title:'Ethics as Practice, Not Just Knowledge', body:'The problem with studying ethics is that it\'s easy to know it and not live it. Aristotle stressed: virtues are acquired through habit. Kant stressed: a deliberate decision to act from duty is required. Mill stressed: we must expand our thinking beyond ourselves to others. Ethics is not only what you believe — it\'s what you do when it\'s hard.' },
        { type:'quiz', question:'Which central question does each philosopher represent in this week?', options:['Aristotle: what is right? Kant: what is good? Mill: who am I?','Aristotle: who should I be? Kant: what must I do? Mill: what brings greatest happiness?','All three answered the same question in different ways'], correct:1, explanation:'This is the map of the week: Aristotle = virtue ethics (who am I, what is my character?). Kant = deontology (what is my duty, what principle guides me?). Mill = utilitarianism (what will bring the greatest well-being?). Three approaches defined by the question they ask.' },
        { type:'reflection', title:'Week Two Closing Questions', questions:['Which approach — Aristotle, Kant, or Mill — comes closest to how you make moral decisions?','Did this week change anything about how you think about "what is right"?','One moral question you\'d like to carry into the next week?'] },
      ]},
    ],
  },
  {
    id: 3, title: 'Doubt and Knowledge', subtitle: 'What can we know — and how?',
    days: [
      { id:1, title:'What Does It Mean to Know?', thinker:'Robert Audi', thinkerId:'audi', xp:30, sections:[
        { type:'idea', title:'Belief, Justification, Knowledge', body:'Say you claim: "I know it will rain tomorrow." But what does "know" actually mean? Philosopher Robert Audi proposes three components that must all be present: you must believe it, your belief must be justified — you have good reasons — and it must be true. Knowledge = justified true belief. Without any one of the three, you have something less than knowledge.' },
        { type:'source', title:'The Four Sources of Knowledge', quote:'"We know things through four main sources: perception, memory, reason, and testimony. Most of what we know came through testimony — through what others told us."', attr:'— Robert Audi, Epistemology: A Contemporary Introduction, 2011', body:'Pause for a moment: what do you know about history? From testimony. About geography? From testimony. About your parents before you were born? From testimony. Audi reminds us that most of our knowledge did not come from direct experience. How much of that have you actually checked?' },
        { type:'explanation', title:'The Skeptic', body:'The philosophical skeptic asks: is it possible to be completely certain of anything? Perhaps our senses deceive us. Perhaps memory is inaccurate. Perhaps what we were told isn\'t true. Philosophical skepticism doesn\'t say "I believe nothing" — it asks: "What exactly justifies our beliefs?" That\'s the question driving this entire week.' },
        { type:'quiz', question:'Which of these counts as "knowledge" according to Audi\'s definition?', options:['I believe it will rain tomorrow','I believe it will rain because I saw a forecast, but it didn\'t rain','I believe it will rain because I saw a forecast, and it did rain'], correct:2, explanation:'Only the third option meets all three conditions: (1) there\'s a belief, (2) there\'s justification (you saw a forecast — a good reason), (3) it\'s true (it rained). The first lacks justification. The second has justification but isn\'t true — so: no knowledge.' },
        { type:'reflection', title:'To Close — Think', questions:['Choose something you "know" — and check: do you have belief, justification, and truth?','How much of what you "know" came through testimony — and how much did you verify?','Are there things you believe without justification — and that you\'re still right to act on?'] },
      ]},
      { id:2, title:'Descartes — Can I Know Anything At All?', thinker:'René Descartes', thinkerId:'descartes', xp:30, sections:[
        { type:'idea', title:'The Method of Radical Doubt', body:'Descartes decided to run an extreme thought experiment: doubt everything that could possibly be doubted — in order to find what remains truly beyond doubt. Do the senses deceive? Yes — sight, hearing, touch can all be wrong. Are you perhaps dreaming right now? There\'s no way to prove you\'re not. And perhaps an evil demon is tricking you in every thought?' },
        { type:'source', title:'The Cogito', quote:'"But immediately I noticed: while I wished to think everything false, it was necessary that I, who was thinking, be something. I think, therefore I am — this truth was so firm and certain that all the most extravagant assumptions of the skeptics were incapable of shaking it."', attr:'— René Descartes, Meditations on First Philosophy, trans. Ido Bassok, Resling', body:'The cogito — cogito ergo sum — "I think, therefore I am" — is the first certainty Descartes found. You can doubt everything. But when you doubt — who is doing the doubting? There must be a "you." The very act of thinking proves that you exist.' },
        { type:'explanation', title:'What Descartes Built on the Cogito', body:'From the cogito, Descartes tried to rebuild all human knowledge. He proved (to his own satisfaction) God\'s existence, and from there the existence of the physical world. Philosophers have long criticized this path — but the cogito itself remains one of the least refutable claims in history: in the very act of doubting, there is someone who doubts.' },
        { type:'quiz', question:'What is the one thing Descartes cannot doubt?', options:['The existence of the physical world','His own existence as a thinking thing','Mathematical truths'], correct:1, explanation:'Descartes can doubt the physical world (perhaps a dream?) and even mathematics (perhaps an evil demon deceives him?). But to doubt — one must think. And to think — one must exist. His existence as "a thinking thing" is the bedrock certainty that cannot be shaken.' },
        { type:'reflection', title:'To Close — Think', questions:['Does the act of doubting prove you exist — or only that something thinks?','Which of your beliefs would survive Descartes\' radical doubt experiment?','Is "I exist" enough as a starting point? What can you build on it?'] },
      ]},
      { id:3, title:'Hume — Are Our Senses Reliable?', thinker:'David Hume', thinkerId:'hume', xp:30, sections:[
        { type:'idea', title:'Two Types of Knowledge — Only One Certain', body:'Hume proposed a sharp distinction: "relations of ideas" — statements whose truth follows from definition. "All bachelors are unmarried" — true by definition, no field survey needed. And "matters of fact" — statements about the world that only experience can verify. "The sun will rise tomorrow" — that\'s a matter of fact. And such matters can never be known with certainty.' },
        { type:'source', title:'The Problem of Induction', quote:'"From observation of the past there is no proof for the future. That the sun will rise tomorrow is no more certain than that it will not. We act from habit — not from logic."', attr:'— David Hume, An Enquiry Concerning Human Understanding, 1748', body:'This is the problem of induction: you\'ve seen a thousand white swans — and concluded all swans are white. Then black swans were discovered in Australia. You can observe gravity a million times — but you cannot prove logically it will always work. We live by habit, not proof.' },
        { type:'explanation', title:'What Are We Left With?', body:'If we can\'t prove statements about the world — are we in trouble? Hume didn\'t think so. He distinguished between philosophical certainty (truly impossible) and practical certainty. We act by habit — and it works. Science accumulates, experience guides. We just shouldn\'t think we have "proof" — we have strong evidence and justified belief.' },
        { type:'quiz', question:'What is Hume\'s "problem of induction"?', options:['We cannot trust our senses at all','Past observations cannot prove future events with certainty','Logic is more reliable than experience'], correct:1, explanation:'Hume didn\'t say senses are worthless — he said there\'s no logical proof that carries from "this is how it\'s been" to "this is how it will always be." We draw general conclusions from particular observations — that\'s induction. Hume showed it\'s justified belief, not proven certainty.' },
        { type:'reflection', title:'To Close — Think', questions:['Which "laws" in your life operate through habit — not through having been tested?','Does the problem of induction frighten you — or can you live with it peacefully?','What\'s the difference between "I know the sun will rise" and "I expect the sun to rise"?'] },
      ]},
      { id:4, title:'Kant — What Does the Mind Bring to Knowledge?', thinker:'Immanuel Kant', thinkerId:'kant', xp:30, sections:[
        { type:'idea', title:'Kant Returns — This Time About Knowledge', body:'We met Kant in Week 2 — there he asked "what must I do?" Here he asks "what can I know?" Kant said Hume "awakened him from his dogmatic slumber." He agreed that not everything can be known from experience — but also that not everything comes from reason alone. The truth? Both are required.' },
        { type:'source', title:'The Copernican Revolution in Philosophy', quote:'"Hitherto it has been assumed that all our knowledge must conform to objects. But suppose instead that objects conform to our knowledge. Just as Copernicus reversed the motion — I reverse the knowing: objects circle the mind."', attr:'— Immanuel Kant, Critique of Pure Reason, trans. Yosef Or, Magnes Press', body:'Kant argued that the mind brings "templates" to experience: time, space, cause and effect — these are not things we learn from the world, they are the lenses through which we see it. Therefore we never see the world "as it really is" (Ding an sich) — only as our mind allows us to perceive it.' },
        { type:'explanation', title:'A Priori and A Posteriori', body:'Kant distinguished: "a priori" knowledge precedes experience — "every event has a cause" is something we bring to experience, not learn from it. "A posteriori" knowledge comes from experience — "it is raining outside." And there\'s a marvel: "synthetic a priori" — statements that expand knowledge and yet can be known prior to experience. This is his central achievement.' },
        { type:'quiz', question:'What is Kant\'s "Copernican revolution" in philosophy?', options:['That the Earth revolves around the Sun','That the world conforms to our mind, not our mind to the world','That knowledge comes only from experience'], correct:1, explanation:'Copernicus reversed the order: not the sun around the earth, but the earth around the sun. Kant did something analogous: not the mind adapting to objects — objects adapting to the mind. We don\'t "discover" categories like causality — we impose them on experience. A pivotal turning point in the history of philosophy.' },
        { type:'reflection', title:'To Close — Think', questions:['Does the idea that you never see the world "as it really is" disturb you — or feel liberating?','Think of a "template" you bring to experience — an assumption that precedes it.','What\'s the difference between "things happen to me" and "I organize the things that happen to me"?'] },
      ]},
      { id:5, title:'Gettier — Three Pages That Changed Everything', thinker:'Edmund Gettier', thinkerId:'gettier', xp:30, sections:[
        { type:'idea', title:'A Three-Page Paper That Broke 2500 Years', body:'1963. Edmund Gettier, a young lecturer, writes a three-page paper. He needs publications to get tenure. The paper is submitted, accepted, and changes philosophy forever. He takes the formula Plato proposed — knowledge = justified true belief — and shows that you can satisfy all three conditions and still not know.' },
        { type:'source', title:'The Smith and Jones Case', quote:'"Smith and Jones are being considered for a job. The employer gave Smith reason to believe Jones will get the job, and Smith counted ten coins in Jones\'s pocket. Smith concludes: whoever gets the job has ten coins. But in fact — Smith gets the job, and happens to have ten coins in his own pocket."', attr:'— Edmund Gettier, Is Justified True Belief Knowledge?, Analysis, 1963', body:'Smith has a justified true belief — "whoever gets the job has ten coins." The claim is true. The justification is good. But he doesn\'t "know" — because he formed the belief about Jones, not himself. You can meet all three conditions and still lack knowledge.' },
        { type:'explanation', title:'The Stopped Clock', body:'Another example: you glance at a wall clock and see 3:15. You believe it\'s 3:15 — and you\'re right. You have justification — you trust the clock. But you don\'t know: the clock stopped 12 hours ago. You happened to look at the exact moment the correct time "passed" over it. The formula holds — the knowledge doesn\'t. The search for a "fourth condition" continues today.' },
        { type:'quiz', question:'What does the Gettier problem demonstrate?', options:['That justified beliefs are always false','That you can have a justified true belief and still lack knowledge','That the concept of knowledge is meaningless'], correct:1, explanation:'Gettier didn\'t claim the formula is worthless — he showed it\'s insufficient. You can satisfy all three conditions (belief + justification + truth) and still lack knowledge, if the connection between justification and truth is accidental. 60 years later, philosophers are still searching for the "fourth condition."' },
        { type:'reflection', title:'To Close — Think', questions:['Think of something you had "justified true belief" about — and later realized you didn\'t know.','Does Gettier\'s story make you doubt something you feel certain about?','If the formula is broken — what do you think is missing from it?'] },
      ]},
      { id:6, title:'Popper — How Does Science Progress?', thinker:'Karl Popper', thinkerId:'popper', xp:30, sections:[
        { type:'idea', title:'Proof Is Impossible — So What Do We Do?', body:'Hume showed induction cannot prove anything. Popper accepted this — and said: fine, let\'s stop trying to prove. Instead of asking "how do we verify a theory?" ask "how could a theory be falsified?" This is the criterion of falsifiability — the idea that made Popper one of the most influential philosophers of science.' },
        { type:'source', title:'Freud, Einstein, and the Difference', quote:'"One thing that troubled me about psychoanalysis: it explains everything. Any behavior confirms Freud. A theory that explains everything explains nothing. Einstein, by contrast, predicted light would bend near the sun. Had it not — the theory would have been falsified."', attr:'— Karl Popper, The Logic of Scientific Discovery, trans. Yosef Agassi, Alo-Et, 2017', body:'In 1919, the prediction was tested during a solar eclipse — and confirmed. But Popper\'s point: what makes it scientific is precisely that it could have been falsified. A theory with no possible way to show it\'s wrong is not scientific. This doesn\'t mean it\'s false — just that it doesn\'t belong to the domain of science.' },
        { type:'explanation', title:'Kuhn\'s Challenge: Scientists Don\'t Actually Work This Way', body:'Thomas Kuhn challenged Popper: in practice, scientists don\'t abandon a theory after a single failed experiment. They look for errors in the experiment, add auxiliary hypotheses, and defend their theory. Kuhn proposed that science progresses through paradigms — and only a "scientific revolution" replaces one. The Popper-Kuhn debate is one of the most productive in philosophy of science.' },
        { type:'quiz', question:'According to Popper, what makes a theory scientific?', options:['That it has been confirmed by many experiments','That it can in principle be refuted by experience','That it was developed by a trained scientist'], correct:1, explanation:'Popper reversed the logic: not "how many experiments confirmed it?" but "is there an experiment that could refute it?" A theory that could be refuted and hasn\'t been — is stronger. A theory that cannot be refuted — is not scientific (even if true). Science, for Popper, is a process of constant attempted falsification.' },
        { type:'reflection', title:'To Close — Think', questions:['Which of your beliefs are "unfalsifiable" — and what does that mean about them?','Is there value in truths that aren\'t scientific — like values, love, art?','What\'s the difference between "this hasn\'t been proven false" and "this has been proven true"?'] },
      ]},
      { id:7, title:'Week Three — The Map of Knowledge', thinker:'All Thinkers', thinkerId:'audi', xp:50, sections:[
        { type:'idea', title:'Two Great Camps', body:'A whole week asking "what can we know?" — and we found two camps: the rationalists — Descartes and Kant — claim the mind brings independent knowledge prior to experience. The empiricists — Hume and Popper — claim everything (or nearly everything) comes from experience. And Gettier? He broke the formula both sides were using.' },
        { type:'source', title:'The Open Question', quote:'"The skeptic asks: is there any certain knowledge at all? 2500 years after the question was raised — it remains open. But perhaps that is precisely what is right about it."', attr:'— Robert Audi, Epistemology: A Contemporary Introduction, 2011', body:'The formula "knowledge = justified true belief" survived 2500 years. Gettier broke it in 3 pages. There\'s still no agreed replacement. And perhaps that\'s just what we\'ve learned: philosophy doesn\'t always end in an answer — it ends in a deeper question.' },
        { type:'explanation', title:'Three Questions, Three Weeks', body:'Three weeks, three questions: Week 1 — what is philosophy? Week 2 — what must I do? Week 3 — what can I know? These are three of Kant\'s great questions: what can I know? what must I do? what may I hope? And perhaps a fourth question connects them all: what is a human being?' },
        { type:'quiz', question:'Who among this week\'s thinkers broke the formula "knowledge = justified true belief"?', options:['David Hume','Karl Popper','Edmund Gettier'], correct:2, explanation:'Gettier broke Plato\'s formula in 1963 — with a three-page paper. Hume and Popper criticized induction and the foundations of empirical knowledge, but the formula itself — JTB — was cracked by Gettier.' },
        { type:'reflection', title:'Week Three Closing Questions', questions:['After this week — is the formula "knowledge = justified true belief" still valid for you?','Which of the three weekly questions is hardest to live without an answer: what is philosophy, what must I do, or what can I know?','One thinker from this week who spoke to you most — and why?'] },
      ]},
    ],
  },
  { id:4, title:'What is Reality?', subtitle:'What exists — and what is real?', days:[
    { id:1, title:'What is Real?', thinker:'Aristotle', thinkerId:'aristotle', xp:30, sections:[
      { type:'idea', title:'What Exists at All?', body:'Metaphysics asks: what exists? What is reality made of? What is the connection between body and mind? Three major camps: materialism (only matter exists), idealism (reality is mental), dualism (two kinds of reality). Each faces serious problems. Do numbers exist? Does love exist in the same way a chair exists?' },
      { type:'source', title:'Ontology: The Inventory of Reality', quote:'"Metaphysics is the branch of philosophy that investigates the fundamental nature of existence — what exists, what kinds of things exist, and what the relations between them are."', attr:'— Koons & Pickavance, Metaphysics: The Fundamentals, Wiley (2015)', body:'When you ask "what exists?" you are doing ontology. A chair exists — obviously. But what about numbers? What about justice? What about pain? They all "exist" — but not in the same way. The philosopher must try to organize everything in the universe into coherent categories.' },
      { type:'explanation', title:'The Three Great Views', body:'The materialist says: only matter exists — your thoughts are brain activity. The idealist says: only mind exists — matter is really just an idea in consciousness. The dualist says: both exist — body and mind are two distinct substances. Each position solves one problem and creates another. Philosophy doesn\'t always give answers — it sharpens the questions.' },
      { type:'quiz', question:'What is ontology?', options:['The study of knowledge and how we know things','The study of what exists and the inventory of reality','The study of moral values and ethics'], correct:1, explanation:'Ontology (from Greek: ontos = being) is the branch of metaphysics concerned with the question "what exists?" — what kinds of entities are there in the universe and what are their relations. The study of knowledge is epistemology (Week 3), and the study of values is ethics (Week 2).' },
      { type:'reflection', title:'To Close — Think', questions:['Choose three things you are certain "exist" — do they exist in the same way?','Do love, pain, and numbers exist? If so — in what sense?','What is your position: materialism, idealism, or dualism? Why?'] },
    ]},
    { id:2, title:'Plato: The World of Forms', thinker:'Plato', thinkerId:'plato', xp:30, sections:[
      { type:'idea', title:'Two Worlds', body:'Plato proposed two worlds: the world of the senses — temporary, changing, imperfect — and the world of Forms — eternal, perfect, more real. The chair you sit on is merely a shadow of the perfect Form of "chair." You recognize perfect circles in geometry because your soul knew the Form of circle before birth.' },
      { type:'source', title:'The Allegory of the Cave', quote:'"Imagine people chained in a cave, backs to the light. They see shadows on the wall and believe they are reality. The philosopher is one who broke free, stepped into the sunlight, and returned to tell the others."', attr:'— Plato, The Republic, Book 7', body:'This allegory is one of the most famous in the history of philosophy. What we see in everyday life are shadows — partial expressions of a deeper reality. The philosopher climbs toward the "sun" — knowledge of absolute goodness — and then returns to educate others. Aristotle\'s critique: the Third Man Argument — connecting a thing to its Form requires another Form, leading to infinite regress.' },
      { type:'explanation', title:'The Problem with the Theory', body:'The central objection: Aristotle\'s "Third Man Argument." If connecting a particular chair to the Form of Chair requires something linking them — call it a third Form — then connecting the particular to that third Form requires a fourth, and so on to infinity. Moreover, the world of Forms cannot be proven empirically — a serious challenge for any theory seeking grounded truth.' },
      { type:'quiz', question:'What does Plato mean by the "world of Forms"?', options:['An imaginary world created by artists and poets','A world of eternal perfect patterns that are more real than what we perceive','The physical world we see around us'], correct:1, explanation:'The world of Forms is more real than the sensory world, according to Plato. Forms are perfect, eternal patterns of which physical things are only imperfect copies. The sun in the allegory of the cave represents the Form of the Good — ultimate reality.' },
      { type:'reflection', title:'To Close — Think', questions:['Is there a "perfect chair" in your mind? Where did it come from?','Does the theory of Forms explain something science cannot?','What "shadow" might you be chained to — in your life, your society, your worldview?'] },
    ]},
    { id:3, title:'Spinoza: Everything is One', thinker:'Spinoza', thinkerId:'spinoza', xp:30, sections:[
      { type:'idea', title:'One Substance Only', body:'Not two worlds — only one substance. God and Nature are the same thing (Deus sive Natura). Body and mind are two ways of describing the same substance. Everything follows fixed laws — there is no free will. Spinoza was excommunicated from his Jewish community at age 23. Freedom for Spinoza does not mean acting against nature — it means understanding it and acting in accordance with it.' },
      { type:'source', title:'God as Nature', quote:'"Besides God no substance can be, nor can be conceived."', attr:'— Baruch Spinoza, Ethics, Part I, translated by Edwin Curley', body:'Spinoza built his Ethics like a geometric system — definitions, axioms, propositions. He argued that everything that exists is a mode of one infinite substance. We are part of the infinite, not separate from it. Our emotions — joy, sadness, love — are also activity of that single substance trying to understand itself.' },
      { type:'explanation', title:'Body and Mind: One Language, One Book', body:'Descartes\' dualism (body and mind are separate) created a problem: how can two completely different things interact? Spinoza solved it radically: body and mind are the same thing — described from two different angles. When you think a thought, there is a physical process in the brain — they are not two separate events but one and the same. Elegant — but is it correct?' },
      { type:'quiz', question:'What does Spinoza mean by "Deus sive Natura"?', options:['God created nature and stands outside it','God and Nature are the same infinite substance','Nature is an illusion created by God'], correct:1, explanation:'Deus sive Natura means "God or (that is to say) Nature." For Spinoza, there is only one substance — infinite and eternal. We call it "God" from one perspective and "Nature" from another. This is monism — all of reality is one substance.' },
      { type:'reflection', title:'To Close — Think', questions:['If there is no free will — can anyone be held responsible for their actions?','Does the idea of "everything is one" feel liberating or oppressive to you?','Spinoza was excommunicated — does radical thinking always come at a social cost?'] },
    ]},
    { id:4, title:'Berkeley: To Be Is To Be Perceived', thinker:'Berkeley', thinkerId:'berkeley', xp:30, sections:[
      { type:'idea', title:'No Matter at All', body:'There is no matter at all. The existence of a thing is its being perceived (esse est percipi). The chair exists because you perceive it. When you leave the room — God perceives it in your place. Samuel Johnson kicked a rock to "refute" Berkeley — but the pain he felt was also a perception. Connection to quantum physics: particles don\'t have definite states before being measured.' },
      { type:'source', title:'To Be Is To Be Perceived', quote:'"The existence of a thing perceived by the senses is nothing different from its being perceived; and therefore, so long as it is not perceived by me, or does not exist in my mind, it does not exist at all."', attr:'— George Berkeley, A Treatise Concerning the Principles of Human Knowledge (1710)', body:'Berkeley was not mad — he was a bishop. He wanted to solve a problem: if all we know are perceptions, how do we know there is "matter" behind the perceptions? His answer: we don\'t — and therefore we need not assume it exists. God ensures the world continues to exist even when no one is perceiving it.' },
      { type:'explanation', title:'The Paradox and the Physics Connection', body:'Objection: Berkeley\'s solution (God always perceives) is circular — it assumes God\'s existence to explain the world\'s existence. Hume would say we cannot know God exists any more than we can know the external world exists. But Berkeley received unexpected support from physics: in quantum mechanics, particles have no definite states before measurement — as if their existence depends on observation.' },
      { type:'quiz', question:'What is Berkeley\'s main claim?', options:['Matter exists independently but we can never know it','Things only exist when they are perceived by a mind','God is the only thing that truly exists'], correct:1, explanation:'Berkeley\'s esse est percipi ("to be is to be perceived") says: existence is perception. Things don\'t exist "out there" independently — they exist within a mind. Berkeley did not claim only God exists — he said human minds also exist, but matter independent of perception does not.' },
      { type:'reflection', title:'To Close — Think', questions:['When you leave a room — what do you think happens to the objects in it?','Does the connection to quantum physics strengthen Berkeley — or is it a superficial link?','If all reality is perception — what does that mean for people whose perception differs from yours?'] },
    ]},
    { id:5, title:'Critique: Where Each View Fails', thinker:'Wittgenstein', thinkerId:'wittgenstein', xp:30, sections:[
      { type:'idea', title:'When Every View Fails', body:'Plato: the Third Man Argument — infinite regress. The world of Forms cannot be proven empirically. Spinoza: if everything follows fixed laws, how do we explain evil? How can we hold anyone morally responsible? Berkeley: his solution (God perceives everything) is circular. Hume would say we can\'t know God exists any more than the external world. Wittgenstein: perhaps these questions are linguistic confusions.' },
      { type:'source', title:'The Infinite Regress', quote:'"If the Form of Horse explains the resemblance between horses, what explains the resemblance between the horses and the Form? A third Form is needed — then a fourth — and there is no end."', attr:'— After Koons & Pickavance, Metaphysics: The Fundamentals, Wiley (2015)', body:'Every major metaphysical theory collapses at some point. The critique of Plato comes from Aristotle himself — his own student. The critique of Spinoza: if everything that happens is necessary, why is there suffering? Critique of Berkeley: if "to be seen is to exist," what happens when different people see the same thing differently? Wittgenstein: "The limits of my language are the limits of my world."' },
      { type:'explanation', title:'Are the Questions Even Right?', body:'The later Wittgenstein offered a striking idea: perhaps the great philosophical problems are not real problems — but the result of misusing language. When we ask "what is ultimate reality?" — perhaps we are using the word "reality" in a way that generates confusion. Not that there are no questions — but that some questions cannot be answered because they are not genuine questions.' },

function u() { return UI[state.lang] || UI.he; }
function getW() {
  const lang = state.lang;

  function deriveDay(d) {
    return {
      id: d.id,
      title: lang === 'en' ? d.titleEn : d.title,
      thinker: lang === 'en' ? d.thinkerEn : d.thinker,
      thinkerId: d.thinkerId,
      xp: d.xp,
      sections: d.sections.map(s => {
        const base = { type: s.type, title: lang === 'en' ? (s.titleEn || s.title) : s.title };
        switch (s.type) {
          case 'idea':
          case 'explanation':
          case 'depth':
            return { ...base, body: lang === 'en' ? s.contentEn : s.content };
          case 'source':
            return { ...base,
              quote: lang === 'en' ? s.quoteEn : s.quote,
              attr:  lang === 'en' ? s.attrEn  : s.attr,
              body:  lang === 'en' ? s.contentEn : s.content };
          case 'quiz':
            return { ...base,
              intro:       lang === 'en' ? (s.introEn || s.intro) : s.intro,
              question:    lang === 'en' ? s.questionEn    : s.question,
              options:     lang === 'en' ? s.optionsEn     : s.options,
              correct:     s.correctIndex,
              explanation: lang === 'en' ? s.explanationEn : s.explanation };
          case 'reflection':
            return { ...base, questions: lang === 'en' ? s.questionsEn : s.questions };
          default: return base;
        }
      }),
    };
  }

  const oldWeeks = lang === 'en' ? WEEKS_EN : WEEKS;
  const oldWeek1 = oldWeeks[0];
  const cdWeek1  = corpusData.weeks[0];

  const week1 = {
    id: 1,
    title:    lang === 'en' ? cdWeek1.titleEn    : cdWeek1.title,
    subtitle: lang === 'en' ? cdWeek1.subtitleEn : cdWeek1.subtitle,
    days: [
      deriveDay(cdWeek1.days[0]),  // Day 1 from corpusData
      deriveDay(cdWeek1.days[1]),  // Day 2 from corpusData
      deriveDay(cdWeek1.days[2]),  // Day 3 from corpusData
      deriveDay(cdWeek1.days[3]),  // Day 4 from corpusData
      deriveDay(cdWeek1.days[4]),  // Day 5 from corpusData
      deriveDay(cdWeek1.days[5]),  // Day 6 from corpusData
      deriveDay(cdWeek1.days[6]),  // Day 7 from corpusData
    ],
  };

  const cdWeek2  = corpusData.weeks[1];
  const oldWeek2 = oldWeeks[1];
  const week2 = {
    id: 2,
    title:    lang === 'en' ? cdWeek2.titleEn    : cdWeek2.title,
    subtitle: lang === 'en' ? cdWeek2.subtitleEn : cdWeek2.subtitle,
    days: [
      deriveDay(cdWeek2.days[0]),  // Day 1 from corpusData
      deriveDay(cdWeek2.days[1]),  // Day 2 from corpusData
      deriveDay(cdWeek2.days[2]),  // Day 3 from corpusData
      deriveDay(cdWeek2.days[3]),  // Day 4 from corpusData
      deriveDay(cdWeek2.days[4]),  // Day 5 from corpusData
      deriveDay(cdWeek2.days[5]),  // Day 6 from corpusData
      deriveDay(cdWeek2.days[6]),  // Day 7 from corpusData
    ],
  };

  const cdWeek3  = corpusData.weeks[2];
  const oldWeek3 = oldWeeks[2];
  const week3 = {
    id: 3,
    title:    lang === 'en' ? cdWeek3.titleEn    : cdWeek3.title,
    subtitle: lang === 'en' ? cdWeek3.subtitleEn : cdWeek3.subtitle,
    days: [
      deriveDay(cdWeek3.days[0]),  // Day 1 from corpusData
      deriveDay(cdWeek3.days[1]),  // Day 2 from corpusData
      deriveDay(cdWeek3.days[2]),  // Day 3 from corpusData
      deriveDay(cdWeek3.days[3]),  // Day 4 from corpusData
      deriveDay(cdWeek3.days[4]),  // Day 5 from corpusData
      deriveDay(cdWeek3.days[5]),  // Day 6 from corpusData
      deriveDay(cdWeek3.days[6]),  // Day 7 from corpusData
    ],
  };

  const cdWeek4  = corpusData.weeks[3];
  const oldWeek4 = oldWeeks[3];
  const week4 = cdWeek4 ? {
    id: 4,
    title:    lang === 'en' ? cdWeek4.titleEn    : cdWeek4.title,
    subtitle: lang === 'en' ? cdWeek4.subtitleEn : cdWeek4.subtitle,
    days: [
      deriveDay(cdWeek4.days[0]),  // Day 1 from corpusData
      deriveDay(cdWeek4.days[1]),  // Day 2 from corpusData
      deriveDay(cdWeek4.days[2]),  // Day 3 from corpusData

      deriveDay(cdWeek4.days[4]),  // Day 5 from corpusData
      deriveDay(cdWeek4.days[5]),  // Day 6 from corpusData
      deriveDay(cdWeek4.days[6]),  // Day 7 from corpusData
    ],
  } : oldWeek4;

  return [week1, week2, week3, week4, ...oldWeeks.slice(4)];

function getLevel(xp) {
  const lvls = getLvls();
  for (let i = lvls.length - 1; i >= 0; i--) {
    if (xp >= lvls[i].min) return i + 1;
  }
  return 1;
}

function getLevelData(xp) {
  const lvls = getLvls();
  const lvl = getLevel(xp);
  const data = lvls[lvl - 1];
  const next = lvls[lvl] || { min: data.max, max: data.max };
  const pct = data.max === Infinity ? 100
    : Math.min(100, ((xp - data.min) / (data.max - data.min)) * 100);
  return { level: lvl, name: data.name, pct, xpInLevel: xp - data.min, needed: data.max - data.min, next };
}

function showScreen(id) {
  if (id !== 'reader') {
    document.getElementById('reader-content').innerHTML = '';
    document.getElementById('reader-btn-bar').innerHTML = '';
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  state.currentScreen = id;
  window.scrollTo(0, 0);
}

function goHome() {
  renderHome();
  showScreen('home');
}

function goBack() {
  if (state.currentScreen === 'reader') {
    renderWeek(state.currentWeek);
    showScreen('week');
  } else {
    goHome();
  }
}

function readerGoBack() {
  if (state.currentSection > 0) {
    state.currentSection--;
    state.quizAnswered = false;
    renderReader();
    const scrollArea = document.getElementById('reader-content');
    if (scrollArea) scrollArea.scrollTop = 0;
  } else {
    if (state.currentWeek) {
      renderWeek(state.currentWeek);
      showScreen('week');
    } else {
      goHome();
    }
  }
}

function renderHome() {
  const ui = u();
  // Dir + toggle label
  document.documentElement.dir = state.lang === 'en' ? 'ltr' : 'rtl';
  document.documentElement.lang = state.lang;
  const ltBtn = document.getElementById('lang-toggle-btn');
  if (ltBtn) ltBtn.textContent = ui.langToggleLabel;

  // Back buttons
  const wb = document.getElementById('week-back-btn');
  const rb = document.getElementById('reader-back-btn');
  if (wb) wb.textContent = ui.backArrow;
  if (rb) rb.textContent = ui.backArrow;

  // Modal labels
  try {
    document.getElementById('modal-xp-earned-label').textContent = ui.xpEarned;
    document.getElementById('modal-streak-label').textContent = ui.answerStreak;
    document.getElementById('modal-unlock-label').textContent = ui.unlockLabel;
    document.getElementById('modal-continue-btn').textContent = ui.continueBtn;
    document.getElementById('modal-levelup-title').textContent = ui.levelupTitle;
    document.getElementById('modal-amazing-btn').textContent = ui.amazingBtn;
    document.getElementById('modal-close-btn').textContent = ui.closeBtn;
  } catch(e) { console.error('renderHome: modal label error', e); }

  // Stats bar
  try {
    document.getElementById('stat-streak').textContent = state.dailyStreak;
    document.getElementById('stat-xp').textContent = state.xp;
    document.getElementById('stat-level').textContent = getLevel(state.xp);
  } catch(e) { console.error('renderHome: stats bar error', e); }

  // Hero continue card — find next incomplete day
  try {
    document.getElementById('home-weeks-title').textContent = ui.weeks;
    document.getElementById('library-modal-title').textContent = ui.thinkers;
    document.getElementById('library-close-btn').textContent = ui.closeBtn;

    let nextWeek = null, nextDay = null;
    for (const w of getW()) {
      if (w.locked) continue;
      for (const d of (w.days || [])) {
        if (!state.completedDays[w.id + '-' + d.id]) {
          nextWeek = w; nextDay = d; break;
        }
      }
      if (nextDay) break;
    }
    const heroTitle = document.getElementById('hero-continue-title');
    const heroSub = document.getElementById('hero-continue-sub');
    const heroBtn = document.getElementById('btn-hero-continue');
    if (nextDay) {
      heroTitle.textContent = state.lang === 'he' ? 'המשך מאיפה שעצרת' : 'Continue where you left off';
      heroSub.textContent = ui.dayLabel(nextDay.id, nextDay.thinker) + ' · ' + nextWeek.title;
      heroBtn.textContent = state.lang === 'he' ? 'המשך ←' : 'Continue →';
      heroBtn.style.display = '';
      heroBtn._nextWeek = nextWeek.id;
      heroBtn._nextDay = nextDay.id;
    } else {
      heroTitle.textContent = state.lang === 'he' ? 'סיימת הכל — כל הכבוד!' : 'All done — great work!';
      heroSub.textContent = '';
      heroBtn.style.display = 'none';
    }
  } catch(e) { console.error('renderHome: hero card error', e); }

  // Library / thinker gallery (in modal)
  const gallery = document.getElementById('thinker-gallery');
  gallery.innerHTML = '';
  try {
    getT().forEach(t => {
      if (!t || !t.id) return;
      try {
        const unlocked = state.unlockedThinkers.includes(t.id);
        const card = document.createElement('div');
        if (t.image) {
          card.className = 'thinker-card painting ' + (unlocked ? 'unlocked' : 'locked');
          card.innerHTML = `
            <div class="thinker-painting-bg" style="background-image:url('${t.image}')"></div>
            <div class="thinker-painting-overlay">
              <div class="thinker-name">${t.name}</div>
              <div class="thinker-era">${t.era}</div>
            </div>
            ${unlocked ? '' : '<div class="thinker-card-lock">🔒</div>'}
          `;
        } else {
          card.className = 'thinker-card ' + (unlocked ? 'unlocked' : 'locked');
          card.innerHTML = `
            <div class="thinker-emoji">${t.emoji}</div>
            <div class="thinker-name">${t.name}</div>
            <div class="thinker-era">${t.era}</div>
            ${unlocked ? '' : '<div class="thinker-card-lock">🔒</div>'}
          `;
        }
        if (unlocked) card.onclick = () => openThinkerModal(t.id);
        gallery.appendChild(card);
      } catch(cardErr) { console.error('renderHome: thinker card error', t && t.id, cardErr); }
    });
  } catch(e) { console.error('renderHome: gallery error', e); }

  // Weeks list
  const wl = document.getElementById('weeks-list');
  wl.innerHTML = '';
  try {
    getW().forEach(w => {
      if (!w || !w.id) return;
      try {
        const completedCount = w.days ? w.days.filter(d => state.completedDays[w.id + '-' + d.id]).length : 0;
        const totalDays = w.days ? w.days.length : 0;
        const allDone = !w.locked && completedCount === totalDays && totalDays > 0;
        const isCurrent = !w.locked && getW().some(ww => !ww.locked && ww.days &&
          ww.days.some(d => !state.completedDays[ww.id + '-' + d.id])) &&
          w.days && w.days.some(d => !state.completedDays[w.id + '-' + d.id]) &&
          !getW().slice(0, getW().indexOf(w)).some(pw => !pw.locked && pw.days && pw.days.some(d => !state.completedDays[pw.id + '-' + d.id]));
        const div = document.createElement('div');
        let cls = 'week-item';
        if (w.locked) cls += ' locked';
        else if (allDone) cls += ' completed-week';
        else if (isCurrent) cls += ' current-week';
        div.className = cls;
        div.innerHTML = `
          <div class="week-num">${w.id}</div>
          <div class="week-info">
            <div class="week-title">${w.title}</div>
            <div class="week-meta">${w.locked ? ui.comingSoon : ui.daysOf(completedCount, totalDays)}</div>
          </div>
          ${allDone ? '<div class="week-check">✓</div>' : ''}
        `;
        if (!w.locked) div.onclick = () => { renderWeek(w.id); showScreen('week'); };
        wl.appendChild(div);
      } catch(weekErr) { console.error('renderHome: week row error', w && w.id, weekErr); }
    });
  } catch(e) { console.error('renderHome: weeks list error', e); }

  populateCarousel();
  requestAnimationFrame(startOnboarding);
}

function populateCarousel() {
  const carousel = document.getElementById('thinker-carousel');
  if (!carousel) return;
  const thinkers = getT().filter(t => t && t.image);
  if (!thinkers.length) { carousel.parentElement.style.display = 'none'; return; }
  carousel.parentElement.style.display = '';
  carousel.innerHTML = '';
  thinkers.forEach(t => {
    const unlocked = state.unlockedThinkers.includes(t.id);
    const card = document.createElement('div');
    card.className = 'thinker-carousel-card ' + (unlocked ? 'unlocked' : 'locked');
    card.innerHTML = `
      <img src="${t.image}" alt="${t.name}" loading="lazy">
      <div class="thinker-carousel-name">${t.name}</div>
    `;
    if (unlocked) card.onclick = () => openThinkerModal(t.id);
    carousel.appendChild(card);
  });
}

function handleHeroContinue() {
  const btn = document.getElementById('btn-hero-continue');
  if (btn._nextWeek && btn._nextDay) {
    openReader(btn._nextWeek, btn._nextDay);
  }
}

function showLibraryModal() {
  document.getElementById('modal-library').classList.add('active');
}

function closeLibraryModal() {
  document.getElementById('modal-library').classList.remove('active');
}
