    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-type-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-heading {
    font-family: 'Nunito', sans-serif;
    font-size: 21px;
    font-weight: 900;
    line-height: 1.4;
    margin-bottom: 14px;
    color: var(--accent);
    text-align: center;
  }
  .section-body {
    font-size: 1rem;
    line-height: 1.8;
    color: #1A1A2E;
    font-weight: 400;
    text-align: right;
  }
  .section-body p {
    margin-bottom: 1.2rem;
  }
  [dir="ltr"] .section-body {
    text-align: left;
  }

  /* Source quote style */
  .source-quote {
    background: rgba(123,79,212,0.05);
    border-right: 4px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 18px 20px 18px 16px;
    margin: 8px 0 14px;
  }
  .source-quote p {
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.8;
    color: #1A1A2E;
    font-style: italic;
  }
  .source-attr {
    font-size: 12px;
    color: #6B5A8E;
    margin-top: 8px;
    text-align: start;
  }

  /* ── Quiz ── */
  .quiz-intro {
    font-size: 1rem;
    line-height: 1.65;
    color: #2D1B69;
    font-weight: 500;
    background: var(--surface-2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }
  .quiz-question {
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    line-height: 1.6;
    margin-bottom: 20px;
    font-weight: 800;
    color: #1A1A2E;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 12px; }
  .quiz-option {
    background: var(--surface-2);
    border: 2px solid var(--border);
    border-bottom: 4px solid var(--border-deep);
    border-radius: 16px;
    padding: 16px 18px;
    cursor: pointer;
    font-size: 1rem;
    text-align: start;
    transition: all 0.3s ease;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: #1A1A2E;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 64px;
  }
  .quiz-option:hover:not(:disabled) {
    border-color: var(--accent);
    border-bottom-color: var(--accent-dark);
    background: rgba(123,79,212,0.08);
    transform: translateY(-1px);
  }
  .quiz-option.correct {
    background: rgba(34,197,94,0.15);
    border: 2px solid #22c55e;
    color: #1A1A2E;
  }
  .quiz-option.wrong {
    background: rgba(239,68,68,0.12);
    border: 2px solid #ef4444;
    color: #1A1A2E;
  }
  .quiz-option.dimmed {
    opacity: 0.4;
    pointer-events: none;
  }
  .quiz-option:disabled { cursor: default; pointer-events: none; }
  .option-correct { background: rgba(34,197,94,0.15) !important; border: 2px solid #22c55e !important; transition: all 0.3s ease; }
  .option-wrong { background: rgba(239,68,68,0.12) !important; border: 2px solid #ef4444 !important; transition: all 0.3s ease; }
  .option-faded { opacity: 0.4; pointer-events: none; transition: all 0.3s ease; }
  .option-indicator {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    flex-shrink: 0;
    color: var(--text-muted);
    font-family: 'Nunito', sans-serif;
  }
  .quiz-feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    display: none;
    border-right: 4px solid transparent;
  }
  .quiz-feedback.correct {
    background: #E8F5E9;
    color: #1B5E20;
    border-right-color: #4CAF50;
    display: block;
  }
  .quiz-feedback.wrong {
    background: #FFEBEE;
    color: #B71C1C;
    border-right-color: #EF5350;
    display: block;
  }

  /* ── Quiz Feedback Modal ── */
  .qfm-box { text-align: center; padding: 28px 24px; }
  .qfm-icon { font-size: 52px; margin-bottom: 6px; }
  .qfm-xp {
    font-size: 22px; font-weight: 800;
    font-family: 'Nunito', sans-serif;
    margin-bottom: 18px;
  }
  .qfm-xp.correct { color: #2E7D32; }
  .qfm-xp.wrong   { color: #C62828; }
  .qfm-explanation {
    font-size: 1rem; line-height: 1.65;
    color: var(--text);
    text-align: start;
    background: var(--surface-2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }
  .share-modal-box { padding: 36px 28px; }
  .share-modal-text {
    font-size: 16px; line-height: 1.75;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .share-modal-skip {
    margin-top: 14px;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .share-modal-copied {
    display: none;
    font-size: 13px;
    color: var(--accent);
    margin-top: 8px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
  }

  /* ── Quiz Summary ── */
  .quiz-summary { text-align: center; padding: 20px 0; }
  .quiz-summary-stars { font-size: 36px; letter-spacing: 6px; margin-bottom: 12px; }
  .quiz-summary-score {
    font-size: 52px; font-weight: 900; font-family: 'Nunito', sans-serif;
    color: var(--accent); margin-bottom: 4px;
  }
  .quiz-summary-label { font-size: 15px; color: var(--text-muted); margin-bottom: 20px; }
  .quiz-summary-msg {
    font-size: 15px; font-weight: 700; padding: 12px 20px;
    border-radius: 14px; display: inline-block; margin-top: 4px;
  }
  .quiz-summary-msg.perfect { background: #E8F5E9; color: #1B5E20; }
  .quiz-summary-msg.good    { background: #E3F2FD; color: #0D47A1; }
  .quiz-summary-msg.ok      { background: #FFF8E1; color: #E65100; }

  /* ── XP Float animation ── */
  .xp-float {
    position: fixed;
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--gold);
    pointer-events: none;
    z-index: 400;
    text-shadow: 0 2px 8px rgba(184,134,11,0.4);
    animation: xpFloat 1.2s ease-out forwards;
  }
  @keyframes xpFloat {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    50% { transform: translateY(-40px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-80px) scale(0.8); opacity: 0; }
  }

  /* ── Closing questions ── */
  .reflection-q {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-2);
  }
  .reflection-q::before {
    content: '✦';
    color: var(--accent);
    font-size: 12px;
    margin-top: 4px;
    flex-shrink: 0;
  }

  /* ── Navigation button ── */
  .nav-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 28px;
    border-bottom: 5px solid var(--accent-dark);
    padding: 18px 24px;
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    width: 100%;
    font-family: 'Nunito', sans-serif;
    transition: all 0.15s;
    margin-top: 8px;
    min-height: 56px;
  }
  .nav-btn:hover { background: #6B40C0; border-bottom-color: #4A2A90; transform: translateY(-1px); }
  .nav-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
  .nav-btn:disabled {
    background: var(--border);
    border-bottom-color: var(--border-deep);
    color: var(--text-muted);
    cursor: default;
    transform: none;
  }
  .nav-btn.secondary {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    border-bottom: 4px solid var(--accent-dark);
  }
  .nav-btn.secondary:hover { background: rgba(123,79,212,0.08); }

  /* ── Completion modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61,31,122,0.45);
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: 5px solid var(--border-deep);
    border-radius: 28px;
    padding: 32px 24px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-emoji { font-size: 56px; margin-bottom: 12px; }
  .modal-title {
    font-family: 'Nunito', sans-serif;
    font-size: 26px;
    font-weight: 900;
    margin-bottom: 8px;
    color: var(--text);
  }
  .modal-subtitle { font-size: 15px; color: var(--text-2); margin-bottom: 20px; line-height: 1.6; }
  .modal-xp {
    background: var(--gold-light);
    border: 1px solid rgba(184,134,11,0.25);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    justify-content: center;
    gap: 28px;
  }
  .modal-xp-item { text-align: center; }
  .modal-xp-value {
    font-family: 'Nunito', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--gold);
  }
  .modal-xp-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .thinker-unlock {
    border: 2px solid var(--accent);
    border-bottom: 4px solid var(--accent-dark);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 20px;
    background: rgba(123,79,212,0.06);
    animation: badgeBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  }
  @keyframes badgeBounce {
    0% { transform: scale(0.7) rotate(-5deg); opacity: 0; }
    60% { transform: scale(1.08) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .thinker-unlock-label {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 800;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .unlock-portrait-img {
    width: 100%;
    height: 280px;
    object-fit: contain;
    border-radius: 12px;
    margin: 8px 0;
    display: block;
  }
  .unlock-portrait-emoji {
    font-size: 48px;
    margin: 8px 0;
  }
  .thinker-unlock-name {
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
  }

  /* ── Level up modal ── */
  .levelup-modal .modal-box {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 50%, #9B6FE4 100%);
    border-color: rgba(123,79,212,0.4);
  }
  .levelup-modal .modal-title { color: white; }
  .levelup-modal .modal-subtitle { color: rgba(255,255,255,0.7); }
  .level-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    pointer-events: none;
    animation: particleBurst 0.8s ease-out forwards;
  }
  @keyframes particleBurst {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* ── Streak indicator ── */
  .streak-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--gold), #8B6914);
    color: white;
    padding: 12px 24px;
    border-radius: 99px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(184,134,11,0.35);
    animation: slideDown 0.3s ease, fadeOut 0.5s ease 2s forwards;
    white-space: nowrap;
    border-bottom: 3px solid #6B5010;
  }
  @keyframes slideDown {
    from { top: 60px; opacity: 0; }
    to { top: 80px; opacity: 1; }
  }
  @keyframes fadeOut {
    to { opacity: 0; }
  }

  /* ── Thinker detail modal ── */
  .thinker-detail .modal-box { text-align: start; overflow: hidden; }
  .thinker-detail .modal-box.has-portrait { padding-top: 0; }
  .thinker-modal-portrait-full {
    width: calc(100% + 48px);
    height: 300px;
    margin: 0 -24px 20px;
    display: block;
    border-radius: 16px 16px 0 0;
    object-fit: cover;
    object-position: center 20%;
  }
  .thinker-detail-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .thinker-detail-emoji { font-size: 48px; }
  .thinker-detail-bio { font-size: 14px; line-height: 1.75; color: var(--text-2); }
  .thinker-detail-quote {
    background: rgba(123,79,212,0.05);
    border-right: 3px solid var(--accent);
    padding: 12px 14px;
    border-radius: 0 10px 10px 0;
    margin: 12px 0;
    font-style: italic;
    font-size: 14px;
    color: var(--text);
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state-text { font-size: 15px; line-height: 1.6; }

  /* ── Confetti / particles ── */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    z-index: 300;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── LTR overrides ── */
  [dir="ltr"] .source-quote { border-right: none; border-left: 4px solid var(--accent); border-radius: 12px 0 0 12px; }
  [dir="ltr"] .thinker-detail-quote { border-right: none; border-left: 3px solid var(--accent); border-radius: 10px 0 0 10px; }
  [dir="ltr"] .section-type-label::after { display: none; }
  [dir="ltr"] .section-type-label::before { content: ''; flex: 1; height: 1px; background: var(--border); }
  [dir="ltr"] .quiz-feedback.correct { border-right: none; border-left: 4px solid #4CAF50; }
  [dir="ltr"] .quiz-feedback.wrong { border-right: none; border-left: 4px solid #EF5350; }
  [dir="ltr"] .thinker-scroll { flex-direction: row; }
  [dir="ltr"] .week-item { flex-direction: row-reverse; }
  [dir="ltr"] .day-item { flex-direction: row-reverse; }

  /* ═══════════════════════════════
     AUTH SCREEN
  ═══════════════════════════════ */
  .auth-screen {
    display: none;
    min-height: 100dvh;
    background: linear-gradient(150deg, #7B4FD4 0%, #4A2A90 100%);
    padding: 40px 20px 60px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 28px;
  }
  .auth-screen.active { display: flex; }
  .auth-logo-wrap { text-align: center; direction: ltr; width: 100%; }
  .auth-logo-text {
    font-family: 'Nunito', sans-serif;
    font-size: 38px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
  }
  .auth-tagline {
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    color: rgba(255,255,255,0.75);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }
  .auth-card {
    background: #fff;
    border-radius: 24px;
    padding: 32px 28px 28px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .auth-mode-toggle {
    display: flex;
    background: #f0eafc;
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 4px;
  }
  .auth-mode-btn {
    flex: 1;
    border: none;
    background: none;
    border-radius: 9px;
    padding: 9px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.18s;
  }
  .auth-mode-btn.active {
    background: #fff;
    color: var(--accent);
    box-shadow: 0 2px 8px rgba(123,79,212,0.15);
  }
  .auth-input {
    width: 100%;
    border: 1.5px solid #e0d8f5;
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.18s;
    box-sizing: border-box;
    direction: ltr;
  }
  .auth-input:focus { border-color: var(--accent); }
  .auth-btn {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .auth-btn:disabled { opacity: 0.6; cursor: default; }
  .auth-btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(123,79,212,0.35);
  }
  .auth-btn-primary:hover:not(:disabled) { background: #6B40C0; }
  .auth-btn-social {
    background: #fff;
    color: var(--text);
    border: 1.5px solid #e0d8f5;
  }
  .auth-btn-social:hover { background: #f7f4ff; border-color: var(--accent); }
  .auth-social-icon {
    font-size: 16px;
    font-weight: 900;
    color: var(--accent);
  }
  .auth-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
    margin: 2px 0;
  }
  .auth-divider::before, .auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e0d8f5;
  }
  .auth-error {
    font-size: 13px;
    color: #ef5350;
    min-height: 18px;
    text-align: center;
    font-family: 'Nunito', sans-serif;
  }
  .logout-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(123,79,212,0.55);
    font-size: 18px;
    padding: 4px 8px;
    border-radius: 8px;
    line-height: 1;
    transition: color 0.15s;
  }
  .logout-btn:hover { color: var(--accent); }
  .lang-toggle-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    color: var(--text-2);
    cursor: pointer;
    padding: 5px 10px;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .lang-toggle-btn:hover { background: var(--border); color: var(--text); }
  .reader-back-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    padding: 6px 10px;
    color: #7B4FD4;
    border-radius: 8px;
    transition: background 0.2s;
    font-weight: 600;
  }
  .reader-back-btn:hover { background: rgba(123,79,212,0.1); }
  .settings-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    padding: 6px;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #7B4FD4;
    transition: background 0.2s;
  }
  .settings-btn:hover {
    background: rgba(123,79,212,0.1);
  }
  .settings-panel {
    position: fixed;
    top: 56px;
    right: 16px;
    z-index: 1000;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    padding: 16px;
    min-width: 200px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;

  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-submit-btn');
  const errEl = document.getElementById('auth-error');
  if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; return; }
  btn.disabled = true;
  btn.textContent = '...';
  errEl.textContent = '';
  errEl.style.color = '';
  if (authMode === 'signin') {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

      errEl.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    appStarted = false; // allow enterApp to run
    await enterApp(data.user);
  } else {
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) {
      errEl.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Sign Up';
      return;
    }

      appStarted = false;
      await enterApp(data.session.user);

      appStarted = false;

    }

}

          { type: 'idea', title: 'המתח הגדול', body: 'המתח האמיתי: האם המציאות קיימת באופן עצמאי מתודעתנו — או שהתודעה יוצרת אותה? אפלטון, שפינוזה, דקארט האמינו במציאות עצמאית. ברקלי ובוסטרום טוענים שהמציאות תלויה בתפיסה. שאלה זו — שהחלה עם הפרה-סוקרטיים ביוון — נותרת פתוחה. קשר לשבוע 3: מה שקיים מעבר לתפיסתנו, לא נוכל לדעת בוודאות.' },
          { type: 'source', title: 'קאנט כגשר', quote: '"הדברים כשלעצמם (ה-Ding an sich) אינם נגישים לתודעה האנושית. אנחנו רואים רק את הופעתם — כפי שהחושים שלנו מארגנים אותם."', attr: '— עמנואל קאנט, ביקורת התבונה הטהורה, תרגום יוסף אור, הוצאת מאגנס', body: 'קאנט ניסה לגשר בין שתי העמדות: הוא הסכים עם ברקלי שאיננו יכולים לגשת למציאות כפי שהיא "בפני עצמה" — אבל הוא לא הסכים שהיא אינה קיימת. יש מציאות עצמאית (Ding an sich), אבל היא תמיד מגיעה אלינו מסוננת דרך מבנה התודעה שלנו. פתרון חלקי — אבל אולי הכי כנה מכולם.' },
          { type: 'explanation', title: 'מה השבוע הזה פתר — ומה לא', body: 'השבוע למדנו שלא ברור מה "מציאות" — אפילו השאלה עצמה שנויה במחלוקת. ראינו ארבע עמדות גדולות, ביקרנו כל אחת, ומצאנו שכל אחת מסבירה משהו. מה שלא פתרנו: האם יש מציאות מעבר לתפיסה? מה הקשר בין גוף לנפש? שאלות אלה נותרות פתוחות — ואולי הפילוסופיה לא באה לפתור אותן אלא ללמד אותנו לחיות איתן.' },
          { type: 'quiz', question: 'מה ה-Ding an sich של קאנט?', options: ['הדבר כפי שהתודעה שלנו תופסת אותו', 'הדבר כפי שהוא קיים בפני עצמו, מעבר לכל תפיסה אנושית', 'אידאה אפלטונית של הדבר המושלם'], correct: 1, explanation: 'ה-Ding an sich ("הדבר כשלעצמו") של קאנט הוא המציאות כפי שהיא קיימת באופן עצמאי — בלתי נגישה לתודעה האנושית. אנחנו תמיד פוגשים את הדברים כפי שהחושים ותבנית החשיבה שלנו מארגנים אותם, לא כפי שהם "ממש" הם.' },
          { type: 'reflection', title: 'לסיום — לחשוב', questions: ['אחרי השבוע הזה — האם השתנתה תשובתך לשאלה "האם המספר 7 קיים?"', 'מאיזה מארבעת השבועות נשארת עם השאלה הכי קשה לשכחה?'] },
        ],
      },
