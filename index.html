function renderWeek(weekId) {
  state.currentWeek = weekId;
  const week = getW().find(w => w.id === weekId);
  document.getElementById('week-screen-title').textContent = week.title;
  const wb = document.getElementById('week-back-btn');
  if (wb) wb.textContent = u().backArrow;

  const dl = document.getElementById('days-list');
  dl.innerHTML = '';
  week.days.forEach((day, idx) => {
    const key = weekId + '-' + day.id;
    const completed = state.completedDays[key];
    const locked = idx > 0 && !state.completedDays[weekId + '-' + week.days[idx-1].id];
    const div = document.createElement('div');
    div.className = 'day-item' + (locked ? ' locked' : '') + (completed ? ' completed' : '');
    div.innerHTML = `
      <div class="day-circle">${completed ? '✓' : locked ? '🔒' : (idx + 1)}</div>
      <div class="day-info">
        <div class="day-title">${day.title}</div>
        <div class="day-thinker">${day.thinker}</div>
      </div>
      <div class="day-xp">⭐ ${day.xp}</div>
    `;
    if (!locked) div.onclick = () => openReader(weekId, day.id);
    dl.appendChild(div);
  });
}

function openReader(weekId, dayId) {
  state.currentWeek = weekId;
  state.currentDay = dayId;
  state.currentSection = 0;
  state.readerXP = 0;
  state.quizAnswered = false;
  state.dayQuizResults = [];
  renderReader();
  showScreen('reader');
}

// ═══════════════════════════════════════════════════════════
// READER
// ═══════════════════════════════════════════════════════════

function toParas(text) {
  return (text || '').split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
}

function renderReader() {
  const week = getW().find(w => w.id === state.currentWeek);
  const day = week.days.find(d => d.id === state.currentDay);
  // Normalize: quiz always comes before reflection, regardless of data order
  const sections = [...day.sections];
  const rIdx = sections.findIndex(s => s.type === 'reflection');
  const qIdx = sections.findIndex(s => s.type === 'quiz');
  if (rIdx !== -1 && qIdx !== -1 && rIdx < qIdx) {
    [sections[rIdx], sections[qIdx]] = [sections[qIdx], sections[rIdx]];
  }
  const sec = sections[state.currentSection];
  const isLast = state.currentSection === sections.length - 1;

  const rb = document.getElementById('reader-back-btn');
  if (rb) rb.textContent = u().backArrow;
  document.getElementById('reader-day-label').textContent = u().dayLabel(day.id, day.thinker);
  document.getElementById('reader-xp-display').textContent = state.readerXP;

  const pct = ((state.currentSection) / sections.length) * 100;
  document.getElementById('reader-progress').style.width = pct + '%';

  const content = document.getElementById('reader-content');
  content.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'section-card';

  const ui = u();
  if (sec.type === 'idea') {
    card.innerHTML = `
      <div class="section-type-label">${ui.labels.idea}</div>
      <div class="section-heading">${sec.title}</div>
      <div class="section-body">${toParas(sec.body)}</div>
    `;
    content.appendChild(card);
    makeNextBtn(isLast ? ui.finishBtn : ui.nextBtn, isLast);
  }
  else if (sec.type === 'source') {
    card.innerHTML = `
      <div class="section-type-label">${ui.labels.source}</div>
      <div class="section-heading">${sec.title}</div>
      <div class="source-quote"><p>${sec.quote}</p><div class="source-attr">${sec.attr}</div></div>
      <div class="section-body">${toParas(sec.body)}</div>
    `;
    content.appendChild(card);
    makeNextBtn(isLast ? ui.finishBtn : ui.nextBtn, isLast);
  }
  else if (sec.type === 'explanation') {
    card.innerHTML = `
      <div class="section-type-label">${ui.labels.explanation}</div>
      <div class="section-heading">${sec.title}</div>
      <div class="section-body">${toParas(sec.body)}</div>
    `;
    content.appendChild(card);
    makeNextBtn(isLast ? ui.finishBtn : ui.nextBtn, isLast);
  }
  else if (sec.type === 'depth') {
    card.innerHTML = `
      <div class="section-type-label">${ui.labels.depth}</div>
      <div class="section-heading">${sec.title}</div>
      <div class="section-body">${toParas(sec.body)}</div>
    `;
    content.appendChild(card);
    makeNextBtn(isLast ? ui.finishBtn : ui.nextBtn, isLast);
  }
  else if (sec.type === 'quiz') {
    card.innerHTML = `
      <div class="section-type-label">${ui.labels.quiz}</div>
      ${sec.intro ? `<div class="quiz-intro">${sec.intro}</div>` : ''}
      <div class="quiz-question">${sec.question}</div>
      <div class="quiz-options" id="quiz-opts"></div>
    `;
    content.appendChild(card);

    const optsEl = card.querySelector('#quiz-opts');
    sec.options.forEach((text, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-option';
      btn.innerHTML = `<span class="option-indicator">${ui.quizLetters[i]}</span>${text}`;
      btn.onclick = () => handleQuiz(i, sec.correct, sec.explanation, btn);
      optsEl.appendChild(btn);
    });

    document.getElementById('reader-btn-bar').innerHTML = '';
  }
  else if (sec.type === 'reflection') {
    card.innerHTML = `
      <div class="section-type-label">${ui.labels.reflection}</div>
      <div class="section-heading">${sec.title}</div>
      <div class="section-body" style="margin-bottom:8px">${ui.reflectPrompt}</div>
      ${sec.questions.map(q => `<div class="reflection-q">${q}</div>`).join('')}
    `;
    content.appendChild(card);
    const reflectionIsLast = state.currentSection === sections.length - 1;
    makeNextBtn(reflectionIsLast ? ui.finishBtn : ui.nextBtn, reflectionIsLast);
  }
  else if (sec.type === 'quiz_summary') {
    const results = state.dayQuizResults || [];
    const total = results.length;
    const correct = results.filter(Boolean).length;
    const pct = total > 0 ? correct / total : 0;
    const stars = pct === 1 ? '⭐⭐⭐' : pct >= 0.5 ? '⭐⭐' : '⭐';
    let msgClass, msgText;
    if (pct === 1)       { msgClass = 'perfect'; msgText = 'מושלם! שלטת בכל החומר 🏆'; }
    else if (pct >= 0.5) { msgClass = 'good';    msgText = 'כל הכבוד! הבנת את הרעיון המרכזי 👍'; }
    else                 { msgClass = 'ok';       msgText = 'כדאי לחזור על הנושא — תמשיך להתאמן! 💪'; }
    card.innerHTML = `
      <div class="section-type-label">📊 סיכום</div>
      <div class="quiz-summary">
        <div class="quiz-summary-stars">${stars}</div>
        <div class="quiz-summary-score">${correct}/${total}</div>
        <div class="quiz-summary-label">תשובות נכונות</div>
        <div class="quiz-summary-msg ${msgClass}">${msgText}</div>
      </div>
    `;
    content.appendChild(card);
    makeNextBtn(ui.finishBtn, true);
  }
}

function makeNextBtn(label, isFinish = false, disabled = false) {
  const btnBar = document.getElementById('reader-btn-bar');
  btnBar.innerHTML = '';

  const week = getW().find(w => w.id === state.currentWeek);
  const isFirstSection = state.currentSection === 0;
  const isFirstDay = week && week.days && week.days[0] && week.days[0].id === state.currentDay;
  const hideBack = isFirstSection && isFirstDay;

  const row = document.createElement('div');
  row.className = 'reader-nav-row';

  if (!hideBack) {
    const backBtn = document.createElement('button');
    backBtn.className = 'btn-reader-back';
    backBtn.id = 'reader-section-back-btn';
    backBtn.textContent = state.lang === 'he' ? '→ חזור' : '← Back';
    backBtn.onclick = readerGoBack;
    row.appendChild(backBtn);
  }

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn-reader-next';
  nextBtn.id = 'reader-next-btn';
  nextBtn.textContent = label;
  nextBtn.disabled = disabled;
  nextBtn.onclick = isFinish ? finishDay : nextSection;
  row.appendChild(nextBtn);

  btnBar.appendChild(row);
  return nextBtn;
}

function nextSection() {
  console.log('Next button clicked');
  const week = getW().find(w => w.id === state.currentWeek);
  const day = week.days.find(d => d.id === state.currentDay);
  if (state.currentSection < day.sections.length - 1) {
    state.readerXP += 5;
    document.getElementById('reader-xp-display').textContent = state.readerXP;
    state.currentSection++;
    state.quizAnswered = false;
    renderReader();
    const scrollArea = document.getElementById('reader-content');
    if (scrollArea) scrollArea.scrollTop = 0;
  }
}

function handleQuiz(chosen, correctIdx, explanation, btn) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;

  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.disabled = true);

  const isCorrect = chosen === correctIdx;
  opts.forEach((o, i) => {
    if (i === chosen) {
      o.classList.add(isCorrect ? 'option-correct' : 'option-wrong');
    } else if (!isCorrect && i === correctIdx) {
      o.classList.add('option-correct');
    } else {
      o.classList.add('option-faded');
    }
  });

  const earnedXP = isCorrect ? 15 : 0;
  state.readerXP += earnedXP;
  document.getElementById('reader-xp-display').textContent = state.readerXP;

  const ui = u();
  if (isCorrect) {
    state.correctInRow = (state.correctInRow || 0) + 1;
    if (state.correctInRow === 3) {
      state.readerXP += 10;
      document.getElementById('reader-xp-display').textContent = state.readerXP;
      showStreakToast(ui.streakToast);
    }
  } else {
    state.correctInRow = 0;
  }

  floatXP(earnedXP, btn);

  if (!state.dayQuizResults) state.dayQuizResults = [];
  state.dayQuizResults.push(isCorrect);

  try { posthog.capture('question_answered', { correct: isCorrect, week: state.currentWeek, day: state.currentDay }); } catch(e) {}

  // Step 1 done — show המשך button; modal opens only on that click
  const btnBar = document.getElementById('reader-btn-bar');
  btnBar.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'reader-nav-row';
  const continueBtn = document.createElement('button');
  continueBtn.className = 'btn-reader-next';
  continueBtn.textContent = state.lang === 'he' ? 'המשך ←' : 'Continue →';
  continueBtn.onclick = () => showQuizExplanation(earnedXP, isCorrect, explanation);
  row.appendChild(continueBtn);
  btnBar.appendChild(row);
}

function showQuizExplanation(earnedXP, isCorrect, explanation) {
  document.getElementById('qfm-icon').textContent = isCorrect ? '✓' : '✗';
  document.getElementById('qfm-icon').style.color = isCorrect ? '#2E7D32' : '#C62828';
  const xpEl = document.getElementById('qfm-xp');
  xpEl.textContent = '+' + earnedXP + ' XP';
  xpEl.className = 'qfm-xp ' + (isCorrect ? 'correct' : 'wrong');
  document.getElementById('qfm-explanation').textContent = explanation;
  document.getElementById('modal-quiz-feedback').classList.add('active');
}

function closeQuizFeedbackModal() {
  document.getElementById('modal-quiz-feedback').classList.remove('active');
  const week = getW().find(w => w.id === state.currentWeek);
  const day = week.days.find(d => d.id === state.currentDay);
  if (state.currentSection >= day.sections.length - 1) {
    finishDay();
  } else {
    nextSection();
  }
}

function finishDay() {
  const week = getW().find(w => w.id === state.currentWeek);
  const day = week.days.find(d => d.id === state.currentDay);
  const key = state.currentWeek + '-' + state.currentDay;

  // If day already completed, don't award XP again
  if (state.completedDays[key]) {
    showHomeScreen();
    return;
  }

  const prevLevel = getLevel(state.xp);

  // Day completion bonus + streak bonus
  state.readerXP += 30;
  state.readerXP += Math.min(state.dailyStreak * 2, 10);

  state.xp += state.readerXP;
  state.completedDays[key] = true;
  state.dailyStreak++;

  // Unlock thinker
  const thinkerId = day.thinkerId;
  if (thinkerId && !state.unlockedThinkers.includes(thinkerId)) {
    state.unlockedThinkers.push(thinkerId);
  }

  // Week completion bonus
  const totalDays = getW().find(w => w.id === state.currentWeek).days.length;
  const completedInWeek = getW().find(w => w.id === state.currentWeek).days.filter(d => state.completedDays[state.currentWeek + '-' + d.id]).length;
  if (completedInWeek === totalDays) {
    state.readerXP += 100;
  }

  const newLevel = getLevel(state.xp);
  try { saveState(); } catch(e) { saveStateLocal(); }

  try {
    posthog.capture('day_completed', { week: state.currentWeek, day: state.currentDay });
    if (completedInWeek === totalDays) posthog.capture('week_completed', { week: state.currentWeek });
  } catch(e) {}

  // Show complete modal
  const thinker = getT().find(t => t.id === thinkerId);
  const ui = u();
  document.getElementById('complete-title').textContent = ui.dayCompleted(day.id);
  document.getElementById('complete-subtitle').textContent = day.title;
  const xpEl = document.getElementById('complete-xp');
  xpEl.textContent = '+0';
  setTimeout(() => animateXPCount(xpEl, state.readerXP), 300);
  document.getElementById('complete-streak').textContent = state.correctInRow;

  if (thinker) {
    document.getElementById('thinker-unlock-box').style.display = 'block';
    const portrait = document.getElementById('unlock-portrait');
    if (thinker.image) {
      portrait.innerHTML = `<img class="unlock-portrait-img" src="${thinker.image}" alt="${thinker.name}">`;
    } else {
      portrait.innerHTML = `<div class="unlock-portrait-emoji">${thinker.emoji}</div>`;
    }
    document.getElementById('unlock-name').textContent = thinker.name;
  } else {
    document.getElementById('thinker-unlock-box').style.display = 'none';
  }

  document.getElementById('modal-complete').classList.add('active');
  launchConfetti();

  if (newLevel > prevLevel) {
    setTimeout(() => {
      const lvlData = getLevelData(state.xp);
      document.getElementById('levelup-text').textContent = u().levelupPrefix + ' ' + lvlData.name;
      document.getElementById('modal-levelup').classList.add('active');
      const box = document.querySelector('#modal-levelup .modal-box');
      if (box) spawnLevelParticles(box);
    }, 2200);
  }
}

function closeCompleteModal() {
  document.getElementById('modal-complete').classList.remove('active');
  const shouldShowShare = state.currentWeek === 1 && state.currentDay === 7;
  renderWeek(state.currentWeek);
  showScreen('week');
  if (shouldShowShare) setTimeout(showSharePrompt, 400);
}

function showSharePrompt() {
  try { if (localStorage.getItem('corpus_share_shown')) return; } catch(e) {}
  const isEn = state.lang === 'en';
  document.getElementById('share-text').textContent = isEn
    ? 'Philosophy is a conversation, not a monologue. If you enjoyed this week — let a friend discover it too.'
    : 'פילוסופיה היא שיחה, לא מונולוג. אם נהנית מהשבוע הזה — תן לחבר לגלות אותו גם.';
  document.getElementById('share-btn').textContent = isEn ? 'Share Corpus' : 'שתף את Corpus';
  document.getElementById('share-skip').textContent = isEn ? 'Skip' : 'דלג';
  document.getElementById('share-copied').style.display = 'none';
  document.getElementById('modal-share').classList.add('active');
}

async function doShare() {
  const url = 'https://omeroth.github.io/corpus-app/';
  const isEn = state.lang === 'en';
  if (navigator.share) {
    try {
      await navigator.share({ title: 'Corpus', text: 'פילוסופיה ב-10 דקות ביום', url });
      try { localStorage.setItem('corpus_share_shown', '1'); } catch(e) {}
      document.getElementById('modal-share').classList.remove('active');
    } catch(e) { /* user cancelled — don't dismiss */ }
  } else {
    try {
      await navigator.clipboard.writeText(url);
    } catch(e) {
      const ta = document.createElement('textarea');
      ta.value = url;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
    }
    const copied = document.getElementById('share-copied');
    copied.textContent = isEn ? 'Link copied!' : 'הקישור הועתק';
    copied.style.display = 'block';
    try { localStorage.setItem('corpus_share_shown', '1'); } catch(e) {}
    setTimeout(() => document.getElementById('modal-share').classList.remove('active'), 1800);
  }
}

function skipShare() {
  try { localStorage.setItem('corpus_share_shown', '1'); } catch(e) {}
  document.getElementById('modal-share').classList.remove('active');
}

function closeLevelUp() {

// FX
// ═══════════════════════════════════════════════════════════

function showStreakToast(msg) {
  const el = document.createElement('div');
  el.className = 'streak-toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function floatXP(amount, triggerEl) {
  const el = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = '+' + amount + ' XP';
  const rect = triggerEl ? triggerEl.getBoundingClientRect() : { left: window.innerWidth/2, top: window.innerHeight/2 };
  el.style.left = (rect.left + rect.width/2 - 30) + 'px';
  el.style.top = (rect.top - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function animateXPCount(el, target) {
  let current = 0;
  const step = Math.ceil(target / 20);
  const timer = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = '+' + current;
    if (current >= target) clearInterval(timer);
  }, 40);
}

function spawnLevelParticles(container) {
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'level-particle';
    const angle = (i / 16) * Math.PI * 2;
    const dist = 60 + Math.random() * 60;
    p.style.cssText = `
      left: 50%; top: 40%;
      --tx: ${Math.cos(angle) * dist}px;
      --ty: ${Math.sin(angle) * dist}px;
      animation-delay: ${Math.random() * 0.2}s;
      background: ${['#7B4FD4','#B8860B','#DDD4F5','#5A35A8'][i % 4]};
    `;
    container.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function launchConfetti() {
  const colors = ['#7B4FD4', '#B8860B', '#DDD4F5', '#5A35A8', '#EF5350'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${6 + Math.random() * 8}px;
      height: ${6 + Math.random() * 8}px;
      animation-duration: ${1.5 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.8}s;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}

    textEn: 'Here you\'ll find all the thinkers you collect. Your personal pantheon!',
    btn: 'מגניב!',
    btnEn: 'Amazing!',
    spotlight: '.thinker-carousel-wrap',
    tailDirection: 'left'
  },
  {
    expr: 'owl-action',
    text: 'וכאן הקסם קורה. לחיצה אחת ואנחנו צוללים פנימה. מוכן?',
    textEn: 'And this is where the magic happens. One tap and we dive in. Ready?',
    btn: 'אני מוכן! 🚀',
    btnEn: 'I\'m ready! 🚀',
    spotlight: '.hero-continue-card',
    tailDirection: 'left'
  }
];

let onboardingStep = 0;

function drawSpotlight(targetSelector) {
  const canvas = document.getElementById('onboarding-spotlight');
  if (!canvas) return;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = 'rgba(42, 27, 74, 0.75)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (targetSelector) {
    const el = document.querySelector(targetSelector);
    if (el) {
      const rect = el.getBoundingClientRect();
      const padding = 12;
      const x = rect.left - padding;
      const y = rect.top - padding;
      const w = rect.width + padding * 2;
      const h = rect.height + padding * 2;
      const r = 16;

      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = 'rgba(123, 79, 212, 0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }
  }
}

window.addEventListener('resize', () => {
  const step = ONBOARDING_STEPS[onboardingStep];
  if (step && document.getElementById('onboarding-overlay').style.display !== 'none') {
    drawSpotlight(step.spotlight);
  }
});

function startOnboarding() {
  if (localStorage.getItem('corpus_onboarding_done')) return;
  const overlay = document.getElementById('onboarding-overlay');
  overlay.style.display = 'block';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      onboardingStep = 0;
      renderOnboardingStep();
    });
  });
}

function renderOnboardingStep() {
  const step = ONBOARDING_STEPS[onboardingStep];

  const owl = document.querySelector('.onboarding-owl-float svg');
  if (owl) {
    owl.classList.remove('owl-neutral', 'owl-determined', 'owl-admiring', 'owl-action');
    owl.classList.add('owl-svg', step.expr);
  }

  const owlFloat = document.getElementById('onboarding-owl-float');
  const speech = document.getElementById('onboarding-speech');

  if (step.spotlight) {
    const target = document.querySelector(step.spotlight);
    if (target) {
      const rect = target.getBoundingClientRect();
      const screenH = window.innerHeight;
      const screenW = window.innerWidth;
      const owlSize = 100;
      const padding = 20;

      if (rect.top < screenH / 2) {
        // Target in top half — place owl+bubble below it
        const owlTop = rect.bottom + padding;
        const owlLeft = padding;
        owlFloat.style.top = owlTop + 'px';
        owlFloat.style.left = owlLeft + 'px';
        owlFloat.style.transform = '';

        speech.style.top = owlTop + 'px';
        speech.style.left = (owlLeft + owlSize + 12) + 'px';
        speech.style.transform = '';

        speech.classList.remove('tail-top', 'tail-left', 'tail-right', 'tail-bottom');
        speech.classList.add('tail-left');
      } else {
        // Target in bottom half — place owl+bubble above it
        const owlTop = rect.top - owlSize - padding;
        const owlLeft = padding;
        owlFloat.style.top = Math.max(owlTop, 60) + 'px';
        owlFloat.style.left = owlLeft + 'px';
        owlFloat.style.transform = '';

        speech.style.top = Math.max(owlTop, 60) + 'px';
        speech.style.left = (owlLeft + owlSize + 12) + 'px';
        speech.style.transform = '';

        speech.classList.remove('tail-top', 'tail-left', 'tail-right', 'tail-bottom');
        speech.classList.add('tail-left');
      }
    }
  } else {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        owlFloat.style.transition = 'none';
        speech.style.transition = 'none';

        // Fix bubble position first
        const bubbleTop = window.innerHeight * 0.42;
        speech.style.top = bubbleTop + 'px';
        const speechWidth = speech.offsetWidth;
        const centerX = window.innerWidth / 2;
        speech.style.left = (centerX - speechWidth / 2) + 'px';
        speech.style.transform = 'none';
        speech.classList.remove('tail-top', 'tail-left', 'tail-right', 'tail-bottom');
        speech.classList.add('tail-top');

        // Place owl so its beak (78% down) aligns with bubble top
        const owlSize = 100;
        const owlTop = bubbleTop - Math.round(owlSize * 0.78);
        const owlCenterX = window.innerWidth / 2;
        owlFloat.style.top = Math.max(owlTop, 20) + 'px';
        owlFloat.style.left = (owlCenterX - owlSize / 2) + 'px';
        owlFloat.style.transform = 'none';

        setTimeout(() => {
          owlFloat.style.transition = '';
          speech.style.transition = '';
        }, 50);
      });
    });
  }

  const isEn = state && state.lang === 'en';
  document.getElementById('onboarding-bubble').textContent = isEn ? step.textEn : step.text;
  document.getElementById('onboarding-btn').textContent = isEn ? step.btnEn : step.btn;

  speech.style.animation = 'none';
  speech.offsetHeight;
  speech.style.animation = 'bubblePop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';

  const dots = document.getElementById('onboarding-dots');
  dots.innerHTML = ONBOARDING_STEPS.map((_,i) =>
    `<div class="onboarding-dot ${i===onboardingStep?'active':''}"></div>`
  ).join('');

  setTimeout(() => drawSpotlight(step.spotlight), 100);
}

function nextOnboardingStep() {
  onboardingStep++;
  if (onboardingStep >= ONBOARDING_STEPS.length) {
    document.getElementById('onboarding-overlay').style.display = 'none';
    localStorage.setItem('corpus_onboarding_done', '1');
    return;
  }
  renderOnboardingStep();
}

async function handleEmailVerification() {
  const hash = window.location.hash;
  if (hash && (hash.includes('access_token') || hash.includes('type=signup'))) {
    try {
      const { data, error } = await sb.auth.getSession();
      if (data?.session?.user) {
        window.location.hash = '';
        appStarted = false;
        await enterApp(data.session.user);
        return true;
      }
    } catch(e) {
      console.error('[Auth] Email verification error:', e);
    }
  }
  return false;
}

let appStarted = false;
async function enterApp(user) {
  if (appStarted) return;
  appStarted = true;
  currentUser = user;
  console.log('[Auth] Entering app as:', user ? user.email : 'guest');
  try {
    await loadProgressFromSupabase();
  } catch(e) {
    console.error('[Auth] loadProgressFromSupabase failed:', e);
  }
  if (user) {
    try {
      const identities = user.identities || [];
      const method = identities.length > 0 ? identities[0].provider : 'email';
      posthog.capture('user_logged_in', { method });
    } catch(e) {}
  }
  hideAuthScreen();
  renderHome();
}

function initUI() {
  try {
    console.log('[Init] initUI started, corpusData weeks:', corpusData && corpusData.weeks && corpusData.weeks.length);
    console.log('[Init] THINKERS length:', THINKERS && THINKERS.length);
    loadState();
    document.documentElement.dir = state.lang === 'en' ? 'ltr' : 'rtl';
    document.documentElement.lang = state.lang;
    // Render home immediately from local state so the screen is never blank.
    // Auth check runs in parallel and calls renderHome() again once resolved.
    renderHome();
  } catch(e) {
    console.error('[Init] initUI failed:', e);
  }

  (async function initApp() {
    try {
      console.log('[Auth] initApp started');

      // Handle email verification redirect (access_token in URL hash)
      let initialEventReceived = false;
      const verified = await handleEmailVerification();
      if (verified) {
        initialEventReceived = true;
      }

      // onAuthStateChange fires INITIAL_SESSION on load — covers both "has session" and "no session".
      // We do NOT call getSession() separately: both would hit the same Supabase storage lock
      // simultaneously and cause "Lock was released because another request stole it".

      sb.auth.onAuthStateChange(async (event, session) => {
        console.log('[Auth] onAuthStateChange:', event, (session && session.user && session.user.email) || 'no session');
        if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION' || event === 'TOKEN_REFRESHED') && session) {
          initialEventReceived = true;
          await enterApp(session.user);
        } else if (event === 'INITIAL_SESSION' && !session) {
          initialEventReceived = true;
          console.log('[Auth] No session — showing auth screen');
          showAuthScreen();
        } else if (event === 'SIGNED_OUT') {
          appStarted = false;
        }
      });

      // Fallback: if INITIAL_SESSION never fires (e.g. Supabase CDN blocked), show auth screen
      setTimeout(() => {
        if (!initialEventReceived) {
          console.log('[Auth] onAuthStateChange timeout — showing auth screen');
          showAuthScreen();
        }
      }, 3000);
    } catch(e) {
      console.error('[Auth] initApp failed:', e);
      showAuthScreen();
    }
  })();
}

// Safari may defer DOMContentLoaded relative to script execution order.
// Use readyState check with DOMContentLoaded fallback to guarantee initUI runs.
if (document.readyState === 'complete' || document.readyState === 'interactive') {
  initUI();
} else {
  document.addEventListener('DOMContentLoaded', initUI);
}
</script>
