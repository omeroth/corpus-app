

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corpus</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F5FF;
    --surface: #FFFFFF;
    --surface-2: #EDE5FF;
    --border: #DDD4F5;
    --border-deep: #C4B0E8;
    --text: #3D1F7A;
    --text-2: #9A80C4;
    --text-muted: #C4B0E8;
    --gold: #B8860B;
    --gold-light: rgba(184,134,11,0.1);
    --accent: #7B4FD4;
    --accent-dark: #5A35A8;
    --accent-glow: rgba(123,79,212,0.3);
    --red: #EF5350;
    --red-light: #FFEBEE;
    --radius: 20px;
    --shadow: 0 4px 20px rgba(61,31,122,0.1);
    --shadow-lg: 0 8px 40px rgba(61,31,122,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: inherit;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ── App shell ── */
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    background: var(--bg);
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    direction: ltr;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-logo-wrap {
    direction: ltr;
    text-align: center;
    width: 100%;
  }
  .topbar-logo {
    font-family: 'Nunito', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .topbar-tagline {
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
    letter-spacing: 0.5px;
    margin-top: 1px;
  }
  .topbar-back {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text-2);
    padding: 4px 8px;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .topbar-back:hover { background: var(--border); }
  .topbar-title {
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 800;
    flex: 1;
    text-align: center;
    margin: 0 8px;
    color: var(--text);
    direction: inherit;
  }

  /* ── Scrollable content ── */
  .scroll-content {
    padding: 20px;
    padding-bottom: 40px;
  }

  /* ── Home: Quote card ── */
  /* ── Stats row ── */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-pill {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: 4px solid var(--border-deep);
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
  }
  .stat-pill .stat-icon { font-size: 20px; margin-bottom: 4px; }
  .stat-pill .stat-value {
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }
  .stat-pill .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Level card ── */
  .level-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: 4px solid var(--border-deep);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 20px;
  }
  .level-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .level-name {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
  }
  .level-badge {
    background: rgba(123,79,212,0.1);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(123,79,212,0.35);
  }
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 99px;
    height: 16px;
    overflow: hidden;
    margin-bottom: 8px;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dark), var(--accent));
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
  }
  .progress-bar-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .progress-label {
    font-size: 12px;
    color: var(--text-muted);
    text-align: start;
  }

  /* ── Section titles ── */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Nunito', sans-serif;
    font-size: 19px;
    font-weight: 900;
    color: var(--text);
  }
  .section-link {
    font-size: 13px;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
  }

  /* ── Thinker cards ── */
  .thinker-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 24px;
    scrollbar-width: none;
    flex-direction: row-reverse;
  }
  .thinker-scroll::-webkit-scrollbar { display: none; }
  .thinker-card {
    flex-shrink: 0;
    width: 100px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-bottom: 4px solid var(--border-deep);
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .thinker-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(123,79,212,0.25); }
  .thinker-card.locked { opacity: 0.4; filter: grayscale(1); }
  .thinker-card.unlocked { border-color: var(--accent); border-bottom-color: var(--accent-dark); }
  .thinker-card.new-unlock {
    animation: thinkerPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes thinkerPop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .thinker-emoji { font-size: 32px; margin-bottom: 6px; }
  .thinker-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin: 0 auto 6px; display: block; }
  .thinker-card.painting {
    padding: 0;
    overflow: hidden;
    border: none;
    width: 110px;
    height: 150px;
    position: relative;
    background: none;
  }
  .thinker-card.painting .thinker-painting-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
  }
  .thinker-card.painting .thinker-painting-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 8px 8px;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
    border-radius: 0 0 14px 14px;
  }
  .thinker-card.painting .thinker-name { color: #fff; font-size: 12px; }
  .thinker-card.painting .thinker-era { color: rgba(255,255,255,0.7); }
  .thinker-card.painting .thinker-card-lock {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    margin: 0;
  }
  .thinker-name {
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }
  .thinker-era { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .thinker-card-lock { font-size: 14px; margin-top: 4px; }

  /* ── Week list ── */
  .week-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: 5px solid var(--border-deep);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .week-item:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(123,79,212,0.1); }
  .week-item.locked { opacity: 0.5; cursor: default; }
  .week-num {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(123,79,212,0.1);
    color: var(--accent);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 2px solid rgba(123,79,212,0.25);
  }
  .week-item.locked .week-num { background: var(--border); color: var(--text-muted); border-color: transparent; }
  .week-info { flex: 1; }
  .week-title {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 3px;
    color: var(--text);
  }
  .week-meta { font-size: 12px; color: var(--text-muted); }
  .week-progress-mini { font-size: 20px; }

  /* ── Week screen ── */
  .day-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: 5px solid var(--border-deep);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .day-item:hover:not(.locked) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(123,79,212,0.1); }
  .day-item.locked { opacity: 0.4; cursor: default; }
  .day-item.completed {
    border-color: var(--accent);
    border-bottom-color: var(--accent-dark);
    background: rgba(123,79,212,0.06);
  }
  .day-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .day-item.completed .day-circle { background: var(--accent); }
  .day-info { flex: 1; }
  .day-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    margin-bottom: 2px;
    color: var(--text);
  }
  .day-thinker { font-size: 12px; color: var(--text-muted); }
  .day-xp {
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    background: var(--gold-light);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(184,134,11,0.25);
  }

  /* ── Reader shell ── */
  .reader-screen-shell {
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }
  .screen.active.reader-screen-shell {
    display: flex;
  }
  .reader-scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 4px;
    -webkit-overflow-scrolling: touch;
  }
  .reader-btn-bar {
    padding: 10px 12px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .reader-btn-bar .nav-btn { margin-top: 0; }

  /* ── Reader ── */
  .reader-topbar {
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .reader-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    direction: ltr;
  }
  .reader-day-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .xp-badge {
    background: var(--gold-light);
    color: var(--gold);
    border: 1px solid rgba(184,134,11,0.3);
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .reader-progress-wrap {
    background: var(--border);
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
    position: relative;
  }
  .reader-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dark), var(--accent));
    border-radius: 99px;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--accent-glow);
    position: relative;
    overflow: hidden;
  }
  .reader-progress-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
    animation: shimmer 2s infinite;
  }

  /* ── Section cards ── */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: 5px solid var(--border-deep);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .section-type-label {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-type-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-heading {
    font-family: 'Nunito', sans-serif;
    font-size: 21px;
    font-weight: 900;
    line-height: 1.4;
    margin-bottom: 14px;
    color: var(--text);
    text-align: center;
  }
  .section-body {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text-2);
    text-align: right;
  }
  .section-body p {
    margin-bottom: 1.2rem;
  }
  [dir="ltr"] .section-body {
    text-align: left;
  }

  /* Source quote style */
  .source-quote {
    background: rgba(123,79,212,0.05);
    border-right: 4px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 18px 20px 18px 16px;
    margin: 8px 0 14px;
  }
  .source-quote p {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.8;
    color: var(--text);
    font-style: italic;
  }
  .source-attr {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: start;
  }

  /* ── Quiz ── */
  .quiz-question {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 20px;
    font-weight: 800;
    color: var(--text);
  }
  .quiz-options { display: flex; flex-direction: column; gap: 12px; }
  .quiz-option {
    background: var(--surface-2);
    border: 2px solid var(--border);
    border-bottom: 4px solid var(--border-deep);
    border-radius: 16px;
    padding: 16px 18px;
    cursor: pointer;
    font-size: 15px;
    text-align: start;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--text);
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 64px;
  }
  .quiz-option:hover:not(:disabled) {
    border-color: var(--accent);
    border-bottom-color: var(--accent-dark);
    background: rgba(123,79,212,0.08);
    transform: translateY(-1px);
  }
  .quiz-option.correct {
    border-color: #4CAF50;
    border-bottom-color: #388E3C;
    background: #E8F5E9;
    color: #1B5E20;
    animation: correctFlash 0.4s ease;
  }
  .quiz-option.wrong {
    border-color: #EF5350;
    border-bottom-color: #C62828;
    background: #FFEBEE;
    color: #B71C1C;
    animation: wrongShake 0.4s ease;
  }
  @keyframes correctFlash {
    0% { transform: scale(1); }
    30% { transform: scale(1.04); background: #C8E6C9; }
    100% { transform: scale(1); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .quiz-option:disabled { cursor: default; }
  .option-indicator {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    flex-shrink: 0;
    color: var(--text-muted);
    font-family: 'Nunito', sans-serif;
  }
  .quiz-option.correct .option-indicator { background: #4CAF50; color: white; }
  .quiz-option.wrong .option-indicator { background: var(--red); color: white; }
  .quiz-feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    display: none;
    border-right: 4px solid transparent;
  }
  .quiz-feedback.correct {
    background: #E8F5E9;
    color: #1B5E20;
    border-right-color: #4CAF50;
    display: block;
  }
  .quiz-feedback.wrong {
    background: #FFEBEE;
    color: #B71C1C;
    border-right-color: #EF5350;
    display: block;
  }

  /* ── XP Float animation ── */
  .xp-float {
    position: fixed;
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--gold);
    pointer-events: none;
    z-index: 400;
    text-shadow: 0 2px 8px rgba(184,134,11,0.4);
    animation: xpFloat 1.2s ease-out forwards;
  }
  @keyframes xpFloat {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    50% { transform: translateY(-40px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-80px) scale(0.8); opacity: 0; }
  }

  /* ── Closing questions ── */
  .reflection-q {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-2);
  }
  .reflection-q::before {
    content: '✦';
    color: var(--accent);
    font-size: 12px;
    margin-top: 4px;
    flex-shrink: 0;
  }

  /* ── Navigation button ── */
  .nav-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 28px;
    border-bottom: 5px solid var(--accent-dark);
    padding: 18px 24px;
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    width: 100%;
    font-family: 'Nunito', sans-serif;
    transition: all 0.15s;
    margin-top: 8px;
    min-height: 56px;
  }
  .nav-btn:hover { background: #6B40C0; border-bottom-color: #4A2A90; transform: translateY(-1px); }
  .nav-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
  .nav-btn:disabled {
    background: var(--border);
    border-bottom-color: var(--border-deep);
    color: var(--text-muted);
    cursor: default;
    transform: none;
  }
  .nav-btn.secondary {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    border-bottom: 4px solid var(--accent-dark);
  }
  .nav-btn.secondary:hover { background: rgba(123,79,212,0.08); }

  /* ── Completion modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61,31,122,0.45);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: 5px solid var(--border-deep);
    border-radius: 28px;
    padding: 32px 24px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-emoji { font-size: 56px; margin-bottom: 12px; }
  .modal-title {
    font-family: 'Nunito', sans-serif;
    font-size: 26px;
    font-weight: 900;
    margin-bottom: 8px;
    color: var(--text);
  }

// ═══════════════════════════════════════════════════════════
// SUPABASE AUTH & PROGRESS SYNC
// ═══════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://xcoikjoatcrjqxzykwlt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjb2lram9hdGNyanF4enlrd2x0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjc5NjYsImV4cCI6MjA4OTcwMzk2Nn0.5EhOsN9M4_kLYoRKO97dPGof8RN7PteXQrtKyx4CcKI';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

async function syncProgressToSupabase() {
  if (!currentUser) return;
  try {
    const completedDaysArr = Object.keys(state.completedDays);
    await sb.from('user_progress').upsert({
      user_id: currentUser.id,
      xp: state.xp,
      level: getLevel(state.xp),
      streak: state.streak,
      completed_days: completedDaysArr,
      unlocked_thinkers: state.unlockedThinkers,
    }, { onConflict: 'user_id' });
  } catch(e) {}
}

async function loadProgressFromSupabase() {
  if (!currentUser) return;
  try {
    const { data } = await sb.from('user_progress')
      .select('*').eq('user_id', currentUser.id).single();
    if (!data) return;
    state.xp = Math.max(state.xp, data.xp || 0);
    state.streak = Math.max(state.streak, data.streak || 0);
    (data.completed_days || []).forEach(k => { state.completedDays[k] = true; });
    (data.unlocked_thinkers || []).forEach(id => {
      if (!state.unlockedThinkers.includes(id)) state.unlockedThinkers.push(id);
    });
    saveStateLocal();
  } catch(e) {}
}

function showAuthScreen() {
  document.getElementById('screen-auth').classList.add('active');
  document.getElementById('app').style.display = 'none';
}

function hideAuthScreen() {
  document.getElementById('screen-auth').classList.remove('active');
  document.getElementById('app').style.display = '';
}

let authMode = 'signin';
function setAuthMode(mode) {
  authMode = mode;
  document.getElementById('auth-signin-tab').classList.toggle('active', mode === 'signin');
  document.getElementById('auth-signup-tab').classList.toggle('active', mode === 'signup');
  document.getElementById('auth-submit-btn').textContent = mode === 'signin' ? 'Sign In' : 'Sign Up';
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  errEl.style.color = '';
}

async function handleAuthSubmit() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-submit-btn');
  const errEl = document.getElementById('auth-error');
  if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; return; }
  btn.disabled = true;
  btn.textContent = '...';
  errEl.textContent = '';
  errEl.style.color = '';
  if (authMode === 'signin') {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    appStarted = false; // allow enterApp to run
    await enterApp(data.user);
  } else {
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) {
      errEl.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Sign Up';
      return;
    }
    if (data.session) {
      // Auto-confirm enabled — session returned immediately
      appStarted = false;
      await enterApp(data.user);
    } else {
      // Email confirmation required
      errEl.style.color = '#22c55e';
      errEl.textContent = 'Check your email to confirm your account.';
      btn.disabled = false;
      btn.textContent = 'Sign Up';
    }
  }
}

async function authWithGoogle() {

          { type: 'idea', title: 'האם אנחנו בסימולציה?', body: 'ניק בוסטרום (2003): לפחות אחת מהשלוש חייבת להיות נכונה: (1) האנושות נכחדת לפני שהגיעה לשלב פוסט-אנושי, (2) ציביליזציות פוסט-אנושיות לא מריצות סימולציות, (3) אנחנו כמעט בוודאות חיים בסימולציה. אם מיליארדי עולמות מדומים קיימים ועולם אמיתי אחד — מה הסיכויים שאתה בעולם האמיתי?' },
          { type: 'source', title: 'הטיעון הסטטיסטי', quote: '"אם ציביליזציות פוסט-אנושיות יריצו מספר גדול של סימולציות של קדמוניהם, אז הרוב המכריע של כל התודעות שחוו תרבות דומה לשלנו חיות בסימולציה."', attr: '— ניק בוסטרום, "האם אתה חי בסימולציה?", הרבעון הפילוסופי (2003)', body: 'הטיעון של בוסטרום לא אומר שאנחנו בהכרח בסימולציה — הוא אומר שלפחות אחת מהשלוש אמיתית. אם אנחנו לא נכחדים ואם ציביליזציות עתידיות יריצו סימולציות — אז מבחינה סטטיסטית, כמות עולמות מדומים תעלה בהרבה על העולמות האמיתיים. ביקורת: הוספנהלדר קוראת לזה "פסאודומדע" — טענה שלא ניתן להפריך.' },
          { type: 'explanation', title: 'הקשר לדקארט ולברקלי', body: 'בוסטרום הוא הגרסה המודרנית של רעיונות עתיקים. דקארט שאל: מה אם שד רע מרמה אותי לגבי כל חוויותיי? ברקלי שאל: מה אם כל המציאות היא תפיסות בתודעה? בוסטרום שואל: מה אם כל חוויותיי הן פלט של מחשב? ההבדל: בוסטרום מנסה לתת לזה בסיס אמפירי-סטטיסטי. הדמיון: כולם מטילים ספק בעצמאות המציאות.' },
          { type: 'quiz', question: 'מה ליבת טיעון הסימולציה של בוסטרום?', options: ['יש לנו הוכחה שאנחנו חיים בסימולציה', 'אם סימולציות אפשריות וצפויות להיות מורצות, הסיכויים הם שאנחנו כבר בסימולציה', 'המציאות היא אשליה שנוצרת על ידי תודעתנו שלנו'], correct: 1, explanation: 'הטיעון של בוסטרום הוא סטטיסטי: אם ציביליזציות מתקדמות מריצות סימולציות, אז מספר עולמות מדומים עולה בהרבה על מספר העולמות האמיתיים. לפיכך, מבחינה סטטיסטית, כל תודעה נתונה היא בסבירות גבוהה בסימולציה. זה לא הוכחה — זה הסתברות.' },
          { type: 'reflection', title: 'לסיום — לחשוב', questions: ['אם היית יודע שאתה בסימולציה — האם היית מתנהג אחרת?', 'האם טיעון הסימולציה הוא פילוסופיה אמיתית או ספקולציה מדעית-בדיונית?', 'מה ההבדל בין "שד רע" של דקארט לבין "סימולציה" של בוסטרום?'] },

      {
        id: 7, title: 'סיכום', thinker: 'קאנט', thinkerId: 'kant', xp: 150,
        sections: [
          { type: 'idea', title: 'המתח הגדול', body: 'המתח האמיתי: האם המציאות קיימת באופן עצמאי מתודעתנו — או שהתודעה יוצרת אותה? אפלטון, שפינוזה, דקארט האמינו במציאות עצמאית. ברקלי ובוסטרום טוענים שהמציאות תלויה בתפיסה. שאלה זו — שהחלה עם הפרה-סוקרטיים ביוון — נותרת פתוחה. קשר לשבוע 3: מה שקיים מעבר לתפיסתנו, לא נוכל לדעת בוודאות.' },
          { type: 'source', title: 'קאנט כגשר', quote: '"הדברים כשלעצמם (ה-Ding an sich) אינם נגישים לתודעה האנושית. אנחנו רואים רק את הופעתם — כפי שהחושים שלנו מארגנים אותם."', attr: '— עמנואל קאנט, ביקורת התבונה הטהורה, תרגום יוסף אור, הוצאת מאגנס', body: 'קאנט ניסה לגשר בין שתי העמדות: הוא הסכים עם ברקלי שאיננו יכולים לגשת למציאות כפי שהיא "בפני עצמה" — אבל הוא לא הסכים שהיא אינה קיימת. יש מציאות עצמאית (Ding an sich), אבל היא תמיד מגיעה אלינו מסוננת דרך מבנה התודעה שלנו. פתרון חלקי — אבל אולי הכי כנה מכולם.' },
          { type: 'explanation', title: 'מה השבוע הזה פתר — ומה לא', body: 'השבוע למדנו שלא ברור מה "מציאות" — אפילו השאלה עצמה שנויה במחלוקת. ראינו ארבע עמדות גדולות, ביקרנו כל אחת, ומצאנו שכל אחת מסבירה משהו. מה שלא פתרנו: האם יש מציאות מעבר לתפיסה? מה הקשר בין גוף לנפש? שאלות אלה נותרות פתוחות — ואולי הפילוסופיה לא באה לפתור אותן אלא ללמד אותנו לחיות איתן.' },
          { type: 'quiz', question: 'מה ה-Ding an sich של קאנט?', options: ['הדבר כפי שהתודעה שלנו תופסת אותו', 'הדבר כפי שהוא קיים בפני עצמו, מעבר לכל תפיסה אנושית', 'אידאה אפלטונית של הדבר המושלם'], correct: 1, explanation: 'ה-Ding an sich ("הדבר כשלעצמו") של קאנט הוא המציאות כפי שהיא קיימת באופן עצמאי — בלתי נגישה לתודעה האנושית. אנחנו תמיד פוגשים את הדברים כפי שהחושים ותבנית החשיבה שלנו מארגנים אותם, לא כפי שהם "ממש" הם.' },
          { type: 'reflection', title: 'לסיום — לחשוב', questions: ['אחרי השבוע הזה — האם השתנתה תשובתך לשאלה "האם המספר 7 קיים?"', 'מאיזה מארבעת השבועות נשארת עם השאלה הכי קשה לשכחה?'] },
        ],
      },
